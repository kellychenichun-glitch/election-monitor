<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選情雷達｜後台設定</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--sf3:#2a2f45;--bd:#333856;--tx:#e8eaf6;--mu:#8892b0;--ac:#64ffda;--ac2:#7c83ff;--da:#ff6b6b;--go:#ffd166;--gr:#06d6a0;--pu:#c77dff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--sf);border-right:1px solid var(--bd);padding:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--bd)}
.sidebar-logo h1{font-size:16px;font-weight:900;color:var(--tx)}
.sidebar-logo h1 span{color:var(--ac)}
.sidebar-logo .ver{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px}
.nav-section{padding:12px 0}
.nav-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:2px;padding:6px 20px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--mu);font-size:13px;transition:all .15s}
.nav-item:hover{color:var(--tx);background:var(--sf2)}
.nav-item.active{color:var(--ac);background:var(--sf2);border-left:2px solid var(--ac)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{padding:32px 40px;max-width:1100px}
.page-header{margin-bottom:28px}
.page-header h2{font-size:22px;font-weight:900;color:var(--tx)}
.page-header p{font-size:13px;color:var(--mu);margin-top:5px}
.section{background:var(--sf);border:1px solid var(--bd);border-radius:12px;margin-bottom:20px;overflow:hidden}
.section-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--sf2)}
.section-title{font-size:14px;font-weight:700;color:var(--tx)}
.section-desc{font-size:12px;color:var(--mu);margin-top:2px}
.section-body{padding:20px}
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.field-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.field input[type=number],.field input[type=text],.field select,.field textarea{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:8px 12px;color:var(--tx);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ac)}
.field textarea{resize:vertical;min-height:80px;font-family:'DM Mono',monospace;font-size:12px}
.field .hint{font-size:11px;color:var(--mu)}
.range-wrap{display:flex;align-items:center;gap:10px}
.range-wrap input[type=range]{flex:1;accent-color:var(--ac)}
.range-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--ac);min-width:28px;text-align:right}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--sf3)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:13px;color:var(--tx)}
.toggle-sub{font-size:11px;color:var(--mu);margin-top:2px}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--sf3);border-radius:22px;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:var(--mu);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--ac)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#000}
.kw-editor{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:12px}
.kw-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:30px}
.kw-tag{display:inline-flex;align-items:center;gap:5px;background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;font-size:12px;font-family:'DM Mono',monospace}
.kw-tag.harm{border-color:var(--da);color:var(--da)}.kw-tag.ben{border-color:var(--gr);color:var(--gr)}.kw-tag.evt{border-color:var(--ac2);color:var(--ac2)}.kw-tag.excl{border-color:var(--go);color:var(--go)}
.kw-x{cursor:pointer;opacity:.6;font-size:14px;line-height:1}.kw-x:hover{opacity:1}
.kw-add{display:flex;gap:8px}
.kw-add input{flex:1;background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:12px;font-family:'DM Mono',monospace;outline:none}
.kw-add input:focus{border-color:var(--ac)}
.kw-add button{background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:6px 12px;color:var(--ac);font-size:12px;cursor:pointer}
.kw-add button:hover{background:var(--ac);color:#000}
.btn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.btn-card{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px}
.btn-card-hd{display:flex;justify-content:space-between;align-items:center}
.btn-card-name{font-size:12px;font-family:'DM Mono',monospace;color:var(--mu)}
.btn-card input{background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--tx);font-size:12px;width:100%;outline:none}
.btn-card input:focus{border-color:var(--ac)}
.action-bar{position:fixed;bottom:0;right:0;left:240px;background:var(--sf);border-top:1px solid var(--bd);padding:14px 40px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.save-status{font-size:13px;font-family:'DM Mono',monospace}
.save-status.saved{color:var(--gr)}.save-status.unsaved{color:var(--go)}
.btn-row{display:flex;gap:10px}
.btn{padding:8px 20px;border-radius:7px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.btn-p{background:var(--ac);color:#000}.btn-p:hover{background:#4dd8bb}
.btn-s{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.btn-s:hover{border-color:var(--ac);color:var(--ac)}
.preview-box{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--ac);max-height:200px;overflow-y:auto;white-space:pre-wrap}
.score-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.score-card{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:10px;text-align:center}
.score-card .lv{font-size:20px;font-weight:900;font-family:'DM Mono',monospace}
.lv.S{color:#ff6b6b}.lv.A{color:#ffa94d}.lv.B{color:#74c0fc}.lv.C{color:var(--mu)}
.score-card .range{font-size:11px;color:var(--mu);margin-top:3px;font-family:'DM Mono',monospace}
.sep{height:1px;background:var(--bd);margin:16px 0}
.platform-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--sf3)}
.platform-row:last-child{border-bottom:none}
.picon{font-size:18px;width:28px;text-align:center}
.pname{flex:1;font-size:13px;font-weight:600}
.purl{flex:2}
.purl input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--mu);font-size:11px;font-family:'DM Mono',monospace;outline:none}
.purl input:focus{border-color:var(--ac);color:var(--tx)}
.toast{position:fixed;top:20px;right:20px;background:var(--gr);color:#000;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;transform:translateY(-60px);opacity:0;transition:all .3s;z-index:1000}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="sidebar-logo">
    <h1>&#x9078;&#x60C5;<span>&#x96F7;&#x9054;</span> &#x2699;&#xFE0F;</h1>
    <div class="ver">Admin Panel v1.0</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">&#x5224;&#x8B80;&#x8A2D;&#x5B9A;</div>
    <div class="nav-item active" onclick="go('scoring')" id="nav-scoring"><span class="icon">&#x1F4CA;</span>&#x8A55;&#x5206;&#x6B0A;&#x91CD;</div>
    <div class="nav-item" onclick="go('keywords')" id="nav-keywords"><span class="icon">&#x1F511;</span>&#x95DC;&#x9375;&#x5B57;&#x898F;&#x5247;</div>
    <div class="nav-item" onclick="go('filters')" id="nav-filters"><span class="icon">&#x1F6AB;</span>&#x904E;&#x6FFE;&#x8A2D;&#x5B9A;</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">&#x524D;&#x53F0;&#x8A2D;&#x5B9A;</div>
    <div class="nav-item" onclick="go('buttons')" id="nav-buttons"><span class="icon">&#x1F39B;&#xFE0F;</span>&#x7BE9;&#x9078;&#x6309;&#x9215;</div>
    <div class="nav-item" onclick="go('platforms')" id="nav-platforms"><span class="icon">&#x1F4E1;</span>&#x5E73;&#x53F0;&#x8A2D;&#x5B9A;</div>
    <div class="nav-item" onclick="go('display')" id="nav-display"><span class="icon">&#x1F5A5;&#xFE0F;</span>&#x986F;&#x793A;&#x8A2D;&#x5B9A;</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">&#x7CFB;&#x7D71;</div>

    <div class="nav-item" onclick="go('export')" id="nav-export"><span class="icon">&#x1F4BE;</span>&#x5302;&#x51FA;/&#x5302;&#x5165;</div>
  </div>
</div>
<div class="main" id="mc"></div>
</div>
<div class="action-bar">
  <div class="save-status" id="ss">&#x26A1; &#x8A2D;&#x5B9A;&#x5DF2;&#x8F09;&#x5165;</div>
  <div class="btn-row">
    <button class="btn btn-s" onclick="resetDef()">&#x91CD;&#x7F6E;&#x9810;&#x8A2D;&#x5024;</button>
    <button class="btn btn-s" onclick="window.open('/election-monitor/','_blank')">&#x958B;&#x555F;&#x524D;&#x53F0; &#x2197;</button>
    <button class="btn btn-p" onclick="saveAll()">&#x1F4BE; &#x5132;&#x5B58;&#x8A2D;&#x5B9A;</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var DEF={
  scoring:{subject_main:3,subject_mention:1,evt_controversy:3,evt_election:2,evt_construction:2,evt_mobilization:2,evt_policy:2,evt_service:1,evt_media:1,evt_general:1,spread_multi:3,spread_single_high:2,spread_single_low:1,cred_media:3,cred_social:2,cred_unknown:1,impact_critical:3,impact_notable:2,impact_record:1,recency_active:2,recency_stale:0},
  thresholds:{S:11,A:9,B:6},
  signal_harmful:["\u722D\u8B70","\u6279\u8A55","\u653B\u64CA","\u6307\u63A7","\u8CA0\u9762","\u554F\u984C","\u5931\u8A00","\u5371\u6A5F","\u8CEA\u8A62","\u8CE3","\u5F0A","\u9192\u8036"],
  signal_beneficial:["\u5B8C\u5DE5","\u722D\u53D6","\u652F\u6301","\u80CC\u66F8","\u7576\u9078","\u529B\u633A","\u63A8\u85A6","\u8087\u5B9A","\u6210\u529F","\u901A\u904E"],
  signal_unclear:["\u8FF7\u56E0","\u8B1B\u523A","\uFF1F","\u75C5","\u50B3\u8AAA","\u64DA\u8AAA"],
  event_controversy:["\u722D\u8B70","\u653B\u6253","\u88AB\u6279","\u8CEA\u7591","\u6307\u63A7","\u5931\u8A00","\u5371\u6A5F"],
  event_election:["\u63D0\u540D","\u5019\u9078","\u9078\u8209","\u5927\u9078","\u9078\u5340","\u7576\u9078","\u521D\u9078"],
  event_construction:["\u5EFA\u8A2D","\u5DE5\u7A0B","\u9053\u8DEF","\u6A4B\u6A11","\u516C\u5712","\u5B78\u6821","\u4EA4\u901A","\u9AD8\u67B6"],
  event_mobilization:["\u9020\u52F4","\u52D5\u54E1","\u5BA3\u50B3","\u6D3B\u52D5","\u52DF\u6B3E","\u5FD7\u5DE5"],
  event_policy:["\u653F\u7B56","\u653F\u898B","\u63D0\u6848","\u8CEA\u8A62","\u4EA4\u901A\u59D4\u54E1","\u5BE9\u67E5"],
  event_service:["\u670D\u52D9","\u62DC\u8A2A","\u8003\u5BDF","\u884C\u7A0B","\u9673\u60C5","\u6703\u52D8"],
  event_media:["\u5C08\u8A2A","\u5A92\u9AD4","\u63A1\u8A2A","\u7BC0\u76EE","\u5831\u5C0E"],
  relevance_high:["\u9078\u8209","\u63D0\u540D","\u7ACB\u59D4","\u7E23\u9577","\u5E02\u9577","\u554F\u653F","\u8CEA\u8A62","\u4EA4\u901A\u59D4\u54E1","\u5F70\u5316\u7E23\u9577","\u5F70\u5316\u5E02\u9577"],
  relevance_must_have_name:true,
  filter_csy_exclude:["\u767D\u7C73","\u5305\u6750","\u8FB2\u7522\u5305\u6750","\u8FB2\u6703","\u7A3B\u7C73","\u81EA\u5099\u888B","\u54E1\u6797\u5E02","\u54E1\u6797\u8FB2\u6703","\u5927\u5CE6\u5DEB","\u5317\u6E9D\u6392\u6C34","\u6C38\u5B89\u5340","\u516B\u5366\u5C71","\u6B65\u9053","\u74B0\u4FDD\u8003\u5BDF","\u5A92\u7956","\u5B97\u6559\u6D3B\u52D5","\u8001\u4EBA\u7167\u8B77","\u9577\u7167","\u6A02\u9F4A"],
  filter_hby_exclude:["\u5176\u4ED6\u7E23\u5E02\u7684\u9EC3\u67CF\u745C"],
  filter_whitelist:["SayYes","\u9673\u7D20\u6708\u59D4\u54E1","Chen Su-Yueh"],
  filter_ig_threads_strict:true,
  filter_buttons:[
    {group:"cand",filter:"all",label:"\u5168\u90E8",enabled:true},
    {group:"cand",filter:"HBY",label:"\u9EC3\u67CF\u745C",enabled:true},
    {group:"cand",filter:"CSY",label:"\u9673\u7D20\u6708",enabled:true},
    {group:"sig",filter:"all",label:"\u5168\u90E8",enabled:true},
    {group:"sig",filter:"ben",label:"\u2705 \u6709\u5229",enabled:true},
    {group:"sig",filter:"har",label:"\u274C \u4E0D\u5229",enabled:true},
    {group:"sig",filter:"neu",label:"\u26AA \u4E2D\u6027",enabled:true},
    {group:"sig",filter:"unc",label:"\u26A0 \u5F85\u5224\u8B80",enabled:true},
    {group:"lev",filter:"all",label:"\u5168\u90E8",enabled:true},
    {group:"lev",filter:"S",label:"S \u7ACB\u5373",enabled:true},
    {group:"lev",filter:"A",label:"A \u9AD8\u5EA6",enabled:true},
    {group:"lev",filter:"B",label:"B \u8FFD\u8E64",enabled:true},
    {group:"lev",filter:"C",label:"C \u5B58\u6A94",enabled:false},
    {group:"src",filter:"all",label:"\u5168\u90E8",enabled:true},
    {group:"src",filter:"FB2",label:"Facebook",enabled:true},
    {group:"src",filter:"IG2",label:"Instagram",enabled:true},
    {group:"src",filter:"TH",label:"Threads",enabled:true},
    {group:"src",filter:"PT",label:"PTT",enabled:true},
    {group:"src",filter:"GO",label:"Google",enabled:true}
  ],
  display:{show_score_points:true,show_relevance_badge:false,default_sort:"level",items_per_page:100,auto_refresh_minutes:5,low_relevance_visible:false},
  platforms:[
    {id:"FB",name:"Facebook",icon:"\uD83D\uDCD8",enabled:true,search_prefix:"site:facebook.com",cred:"medium"},
    {id:"IG",name:"Instagram",icon:"\uD83D\uDCF8",enabled:true,search_prefix:"site:instagram.com",cred:"medium"},
    {id:"Threads",name:"Threads",icon:"\uD83E\uDDF5",enabled:true,search_prefix:"site:threads.net",cred:"medium"},
    {id:"PTT",name:"PTT",icon:"\uD83D\uDCAC",enabled:true,search_prefix:"site:ptt.cc",cred:"low"},
    {id:"Google",name:"Google Search",icon:"\uD83D\uDD0D",enabled:true,search_prefix:"",cred:"high"}
  ]
};

var C={};
var dirty=false;
var curPage="scoring";

function loadC(){var s=localStorage.getItem("emcfg");if(s){try{C=JSON.parse(s);merge(C,DEF);}catch(e){C=JSON.parse(JSON.stringify(DEF));}}else{C=JSON.parse(JSON.stringify(DEF));}}
function merge(t,s){for(var k in s){if(!(k in t))t[k]=JSON.parse(JSON.stringify(s[k]));else if(typeof s[k]==="object"&&!Array.isArray(s[k])&&s[k]!==null){if(typeof t[k]!=="object")t[k]={};merge(t[k],s[k]);}}}
function mark(){dirty=true;var el=document.getElementById("ss");el.textContent="\u26A0 \u6709\u672A\u5132\u5B58\u7684\u8B8A\u66F4";el.className="save-status unsaved";}
function saveAll(){localStorage.setItem("emcfg",JSON.stringify(C));dirty=false;var el=document.getElementById("ss");el.textContent="\u2705 \u8A2D\u5B9A\u5DF2\u5132\u5B58";el.className="save-status saved";toast("\u8A2D\u5B9A\u5DF2\u5132\u5B58\uFF01\u524D\u53F0\u91CD\u6574\u5F8C\u751F\u6548");}
function resetDef(){if(!confirm("\u78BA\u5B9A\u8981\u91CD\u7F6E\u6240\u6709\u8A2D\u5B9A\u70BA\u9810\u8A2D\u5024\u55CE\uFF1F"))return;C=JSON.parse(JSON.stringify(DEF));go(curPage);mark();toast("\u5DF2\u91CD\u7F6E\u70BA\u9810\u8A2D\u5024");}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}

function go(page){
  curPage=page;
  document.querySelectorAll(".nav-item").forEach(function(n){n.classList.remove("active");});
  document.getElementById("nav-"+page).classList.add("active");
  var mc=document.getElementById("mc");
  if(page==="scoring")mc.innerHTML=renderScoring();
  else if(page==="keywords")mc.innerHTML=renderKW();
  else if(page==="filters")mc.innerHTML=renderFilters();
  else if(page==="buttons")mc.innerHTML=renderButtons();
  else if(page==="platforms")mc.innerHTML=renderPlatforms();
  else if(page==="display")mc.innerHTML=renderDisplay();
  else if(page==="health")mc.innerHTML=renderHealth();
  else if(page==="export")mc.innerHTML=renderExport();
}

// ---- SCORING ----
function sl(key,lbl,hint,max){
  var v=C.scoring[key]||0;
  return '<div class="field"><label>'+lbl+'</label><div class="range-wrap"><input type="range" min="0" max="'+max+'" value="'+v+'" oninput="C.scoring[\''+key+'\']=parseFloat(this.value);this.nextElementSibling.textContent=this.value;mark()"><span class="range-val">'+v+'</span></div>'+(hint?'<div class="hint">'+hint+'</div>':'')+'</div>';
}
function renderScoring(){
  var t=C.thresholds,s=C.scoring;
  var mx=s.subject_main+s.evt_controversy+s.spread_multi+s.cred_media+s.impact_critical+s.recency_active;
  return '<div class="page-header"><h2>&#x1F4CA; &#x8A55;&#x5206;&#x6B0A;&#x91CD;&#x8A2D;&#x5B9A;</h2><p>&#x8ABF;&#x6574;&#x5404;&#x56E0;&#x5B50;&#x7684;&#x5206;&#x6578;&#x6B0A;&#x91CD;&#xFF0C;&#x5F71;&#x97FF; S/A/B/C &#x7B49;&#x7D1A;&#x5224;&#x65B7;</p></div>'+
  '<div class="section"><div class="section-header"><div><div class="section-title">&#x7B49;&#x7D1A;&#x95A8;&#x5024;&#xFF08;&#x76EE;&#x524D;&#x6700;&#x9AD8;&#x5206;&#xFF1A;'+mx+'&#xFF09;</div></div></div><div class="section-body"><div class="field-grid-3">'+
