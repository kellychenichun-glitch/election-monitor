<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選情雷達｜後台設定</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--sf3:#2a2f45;--bd:#333856;--tx:#e8eaf6;--mu:#8892b0;--ac:#64ffda;--ac2:#7c83ff;--da:#ff6b6b;--go:#ffd166;--gr:#06d6a0;--pu:#c77dff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--sf);border-right:1px solid var(--bd);position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--bd)}
.sidebar-logo h1{font-size:16px;font-weight:900;color:var(--tx)}
.sidebar-logo h1 span{color:var(--ac)}
.ver{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px}
.nav-section{padding:12px 0}
.nav-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:2px;padding:6px 20px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--mu);font-size:13px;transition:all .15s}
.nav-item:hover{color:var(--tx);background:var(--sf2)}
.nav-item.active{color:var(--ac);background:var(--sf2);border-left:2px solid var(--ac)}
.main{padding:32px 40px;max-width:1100px;padding-bottom:80px}
.page-header{margin-bottom:28px}
.page-header h2{font-size:22px;font-weight:900}
.page-header p{font-size:13px;color:var(--mu);margin-top:5px}
.section{background:var(--sf);border:1px solid var(--bd);border-radius:12px;margin-bottom:20px;overflow:hidden}
.section-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--sf2)}
.section-title{font-size:14px;font-weight:700}
.section-desc{font-size:12px;color:var(--mu);margin-top:2px}
.section-body{padding:20px}
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.field-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.field input[type=number],.field input[type=text],.field select,.field textarea{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:8px 12px;color:var(--tx);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ac)}
.field textarea{resize:vertical;min-height:80px;font-family:'DM Mono',monospace;font-size:12px}
.field .hint{font-size:11px;color:var(--mu)}
.range-wrap{display:flex;align-items:center;gap:10px}
.range-wrap input[type=range]{flex:1;accent-color:var(--ac)}
.range-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--ac);min-width:28px;text-align:right}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--sf3)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:13px}
.toggle-sub{font-size:11px;color:var(--mu);margin-top:2px}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--sf3);border-radius:22px;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:var(--mu);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--ac)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#000}
.kw-editor{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:12px}
.kw-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:30px}
.kw-tag{display:inline-flex;align-items:center;gap:5px;background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;font-size:12px;font-family:'DM Mono',monospace}
.kw-tag.harm{border-color:var(--da);color:var(--da)}.kw-tag.ben{border-color:var(--gr);color:var(--gr)}
.kw-tag.evt{border-color:var(--ac2);color:var(--ac2)}.kw-tag.exc{border-color:var(--go);color:var(--go)}
.kw-tag.wl{border-color:var(--gr);color:var(--gr)}
.kw-x{cursor:pointer;opacity:.6;font-size:14px;line-height:1}.kw-x:hover{opacity:1}
.kw-add{display:flex;gap:8px}
.kw-add input{flex:1;background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:12px;font-family:'DM Mono',monospace;outline:none}
.kw-add input:focus{border-color:var(--ac)}
.kw-add button{background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:6px 14px;color:var(--ac);font-size:13px;cursor:pointer;font-weight:700}
.kw-add button:hover{background:var(--ac);color:#000}
.btn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.btn-card{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px}
.btn-card-header{display:flex;justify-content:space-between;align-items:center}
.btn-card-name{font-size:11px;font-family:'DM Mono',monospace;color:var(--mu)}
.btn-card-group{font-size:10px;color:var(--pu);background:rgba(199,125,255,.12);padding:2px 6px;border-radius:4px}
.btn-card input{background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--tx);font-size:12px;width:100%;outline:none}
.btn-card input:focus{border-color:var(--ac)}
.action-bar{position:fixed;bottom:0;right:0;left:240px;background:var(--sf);border-top:1px solid var(--bd);padding:14px 40px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.save-st{font-size:13px;font-family:'DM Mono',monospace}
.saved{color:var(--gr)}.unsaved{color:var(--go)}
.btn-row{display:flex;gap:10px}
.btn{padding:8px 20px;border-radius:7px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.btn-p{background:var(--ac);color:#000}.btn-p:hover{background:#4dd8bb}
.btn-s{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.btn-s:hover{border-color:var(--ac);color:var(--ac)}
.preview-box{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--ac);max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.score-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.sc-card{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:10px;text-align:center}
.sc-lv{font-size:20px;font-weight:900;font-family:'DM Mono',monospace}
.lv-S{color:#ff6b6b}.lv-A{color:#ffa94d}.lv-B{color:#74c0fc}.lv-C{color:var(--mu)}
.sc-range{font-size:11px;color:var(--mu);margin-top:3px;font-family:'DM Mono',monospace}
.sep{height:1px;background:var(--bd);margin:16px 0}
.plat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--sf3)}
.plat-row:last-child{border-bottom:none}
.plat-icon{font-size:18px;width:28px;text-align:center}
.plat-name{min-width:100px;font-size:13px;font-weight:600}
.plat-url{flex:2}
.plat-url input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--mu);font-size:11px;font-family:'DM Mono',monospace;outline:none}
.plat-url input:focus{border-color:var(--ac);color:var(--tx)}
.toast{position:fixed;top:20px;right:20px;background:var(--gr);color:#000;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;transform:translateY(-60px);opacity:0;transition:all .3s;z-index:1000}
.toast.show{transform:translateY(0);opacity:1}
.health-stat{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.hs-card{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:14px}
.hs-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.hs-value{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ac)}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="sidebar-logo">
    <h1>選情<span>雷達</span> ⚙️</h1>
    <div class="ver">Admin Panel v1.0 &middot; 設定儲存於瀏覽器</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">判讀設定</div>
    <div class="nav-item active" onclick="go('scoring')" id="n-scoring"><span>📊</span>評分權重</div>
    <div class="nav-item" onclick="go('keywords')" id="n-keywords"><span>🔑</span>關鍵字規則</div>
    <div class="nav-item" onclick="go('filters')" id="n-filters"><span>🚫</span>過濳設定</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">前台設定</div>
    <div class="nav-item" onclick="go('buttons')" id="n-buttons"><span>🎛️</span>篩選按鈕</div>
    <div class="nav-item" onclick="go('platforms')" id="n-platforms"><span>📡</span>平台設定</div>
    <div class="nav-item" onclick="go('display')" id="n-display"><span>🖥️</span>顯示設定</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">系統</div>
    <div class="nav-item" onclick="go('health')" id="n-health"><span>🔍</span>系統健康</div>
    <div class="nav-item" onclick="go('export')" id="n-export"><span>💾</span>匙出/匙入</div>
  </div>
</div>
<div class="main" id="mc"></div>
</div>
<div class="action-bar">
  <div class="save-st" id="sst">⚡ 設定已載入</div>
  <div class="btn-row">
    <button class="btn btn-s" onclick="resetDef()">重置預設値</button>
    <button class="btn btn-s" onclick="window.open('https://kellychenichun-glitch.github.io/election-monitor/','_blank')">開啟前台 ↗</button>
    <button class="btn btn-p" onclick="saveAll()">💾 儲存設定</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var DEFAULTS={
  scoring:{subject_main:3,subject_mention:1,evt_controversy:3,evt_election:2,evt_construction:2,evt_mobilization:2,evt_policy:2,evt_service:1,evt_media:1,evt_general:1,spread_multi:3,spread_single_high:2,spread_single_low:1,cred_media:3,cred_social:2,cred_unknown:1,impact_critical:3,impact_notable:2,impact_record:1,recency_active:2,recency_stale:0},
  thresholds:{S:11,A:9,B:6},
  signal_harmful:['爭議','批評','攻擊','指控','失言','危機','質疑','賄','弊','醒荦','送辦','起訴','提告'],
  signal_beneficial:['完工','等取','支持','背書','當選','力挺','推薦','肯定','成功','通過','發春'],
  signal_unclear:['迷因','諷刺','？','痑','傳說','據說'],
  event_controversy:['爭議','攻打','被批','質疑','指控','失言','危機'],
  event_election:['提名','候選','選舉','大選','選區','當選','初選'],
  event_construction:['建設','工程','道路','橋樑','公園','學校','交通','高架'],
  event_mobilization:['造勴','動員','宣傳','活動','募款','志工'],
  event_policy:['政策','政見','提案','質詢','交通委員','審查'],
  event_service:['服務','拜訪','考察','行程','陳情','會勘'],
  event_media:['專訪','媒體','採訪','節目','報導'],
  relevance_high:['選舉','提名','立委','縣長','市長','問政','質詢','交通委員','彰化縣長','彰化市長'],
  relevance_must_have_name:true,
  filter_csy_exclude:['白米','包材','農產包材','農會','稻米','自備袋','員林市','員林市長','員林農會','大峦巫步道','北溝排水','永安區','八卦山','步道','環保考察','媒祖','宗教活動','老人照護','長照','樂齊'],
  filter_hby_exclude:['其他縣市的黃柏瑜'],
  filter_whitelist:['SayYes','陳素月委員','Chen Su-Yueh'],
  filter_ig_threads_strict:true,
  filter_buttons:[
    {group:'cand',filter:'all',label:'全部',enabled:true},
    {group:'cand',filter:'HBY',label:'黃柏瑜',enabled:true},
    {group:'cand',filter:'CSY',label:'陳素月',enabled:true},
    {group:'sig',filter:'all',label:'全部',enabled:true},
    {group:'sig',filter:'ben',label:'✅ 有利',enabled:true},
    {group:'sig',filter:'har',label:'❌ 不利',enabled:true},
    {group:'sig',filter:'neu',label:'⚪ 中性',enabled:true},
    {group:'sig',filter:'unc',label:'⚠ 待判讀',enabled:true},
    {group:'lev',filter:'all',label:'全部',enabled:true},
    {group:'lev',filter:'S',label:'S 立即',enabled:true},
    {group:'lev',filter:'A',label:'A 高度',enabled:true},
    {group:'lev',filter:'B',label:'B 追蹤',enabled:true},
    {group:'lev',filter:'C',label:'C 存檔',enabled:false},
    {group:'src',filter:'all',label:'全部',enabled:true},
    {group:'src',filter:'FB2',label:'Facebook',enabled:true},
    {group:'src',filter:'IG2',label:'Instagram',enabled:true},
    {group:'src',filter:'TH',label:'Threads',enabled:true},
    {group:'src',filter:'PT',label:'PTT',enabled:true},
    {group:'src',filter:'GO',label:'Google',enabled:true}
  ],
  display:{show_score_points:true,show_relevance_badge:false,default_sort:'level',items_per_page:100,auto_refresh_minutes:5,low_relevance_visible:false},
  platforms:[
    {id:'FB',name:'Facebook',icon:'📘',enabled:true,search_prefix:'site:facebook.com',cred:'medium'},
    {id:'IG',name:'Instagram',icon:'📸',enabled:true,search_prefix:'site:instagram.com',cred:'medium'},
    {id:'Threads',name:'Threads',icon:'🧵',enabled:true,search_prefix:'site:threads.net',cred:'medium'},
    {id:'PTT',name:'PTT',icon:'💬',enabled:true,search_prefix:'site:ptt.cc',cred:'low'},
    {id:'Google',name:'Google Search',icon:'🔍',enabled:true,search_prefix:'',cred:'high'}
  ]
};

var C={},cur='scoring',dirty=false;

function load(){var s=localStorage.getItem('em_admin_cfg');if(s){try{C=JSON.parse(s);merge(C,DEFAULTS);}catch(e){C=JSON.parse(JSON.stringify(DEFAULTS));}}else{C=JSON.parse(JSON.stringify(DEFAULTS));}}
function merge(t,s){for(var k in s){if(!(k in t))t[k]=JSON.parse(JSON.stringify(s[k]));else if(typeof s[k]==='object'&&!Array.isArray(s[k])&&s[k]!==null){if(typeof t[k]!=='object')t[k]={};merge(t[k],s[k]);}}}
function mark(){dirty=true;var el=document.getElementById('sst');el.textContent='⚠ 有未儲存的變更';el.className='save-st unsaved';}
function saveAll(){localStorage.setItem('em_admin_cfg',JSON.stringify(C));dirty=false;var el=document.getElementById('sst');el.textContent='✅ 設定已儲存';el.className='save-st saved';toast('設定已儲存！前台重整後生效');}
function resetDef(){if(!confirm('確定要重置所有設定為預設値嗎？'))return;C=JSON.parse(JSON.stringify(DEFAULTS));go(cur);mark();toast('已重置為預設値');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function upScore(sec,key,val){if(!C[sec])C[sec]={};C[sec][key]=parseFloat(val);mark();var prev=document.getElementById('sc-preview');if(prev)prev.innerHTML=scoreCards();}
function scoreCards(){var t=C.thresholds;return '<div class="sc-card"><div class="sc-lv lv-S">S</div><div class="sc-range">≥'+t.S+' 分<br>立即處理</div></div><div class="sc-card"><div class="sc-lv lv-A">A</div><div class="sc-range">≥'+t.A+' 分<br>高度關注</div></div><div class="sc-card"><div class="sc-lv lv-B">B</div><div class="sc-range">≥'+t.B+' 分<br>持續追蹤</div></div><div class="sc-card"><div class="sc-lv lv-C">C</div><div class="sc-range">< '+t.B+' 分<br>存檔參考</div></div>';}

function go(page){cur=page;document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});document.getElementById('n-'+page).classList.add('active');var mc=document.getElementById('mc');
switch(page){case 'scoring':mc.innerHTML=renderScoring();break;case 'keywords':mc.innerHTML=renderKW();break;case 'filters':mc.innerHTML=renderFilters();break;case 'buttons':mc.innerHTML=renderBtns();break;case 'platforms':mc.innerHTML=renderPlats();break;case 'display':mc.innerHTML=renderDisplay();break;case 'health':mc.innerHTML=renderHealth();break;case 'export':mc.innerHTML=renderExport();break;}}

function slider(sec,key,label,hint,mn,mx){var v=C[sec]&&C[sec][key]!==undefined?C[sec][key]:0;return '<div class="field"><label>'+label+'</label><div class="range-wrap"><input type="range" min="'+mn+'" max="'+mx+'" value="'+v+'" oninput="upScore(''+sec+'',''+key+'',this.value);this.nextSibling.textContent=this.value"><span class="range-val">'+v+'</span></div>'+(hint?'<div class="hint">'+hint+'</div>':'')+'</div>';}

function renderScoring(){var t=C.thresholds,s=C.scoring,mx=s.subject_main+s.evt_controversy+s.spread_multi+s.cred_media+s.impact_critical+s.recency_active;
return '<div class="page-header"><h2>📊 評分權重設定</h2><p>調整各因子的分數權重，影響 S/A/B/C 等級判斷（目前最高分：'+mx+'）</p></div>'+
'<div class="section"><div class="section-header"><div><div class="section-title">等級門滝</div><div class="section-desc">調整 S/A/B/C 的分數門滝</div></div></div><div class="section-body">'+
'<div class="field-grid-3">'+
'<div class="field"><label>S 級（立即處理）≥</label><input type="number" value="'+t.S+'" min="1" max="25" onchange="C.thresholds.S=parseInt(this.value);mark();document.getElementById('sc-preview').innerHTML=scoreCards()"></div>'+
'<div class="field"><label>A 級（高度關注）≥</label><input type="number" value="'+t.A+'" min="1" max="25" onchange="C.thresholds.A=parseInt(this.value);mark();document.getElementById('sc-preview').innerHTML=scoreCards()"></div>'+
'<div class="field"><label>B 級（持續追蹤）≥</label><input type="number" value="'+t.B+'" min="1" max="25" onchange="C.thresholds.B=parseInt(this.value);mark();document.getElementById('sc-preview').innerHTML=scoreCards()"></div>'+
'</div><div class="score-cards" id="sc-preview">'+scoreCards()+'</div></div></div>'+
'<div class="section"><div class="section-header"><div class="section-title">主體性</div></div><div class="section-body"><div class="field-grid">'+slider('scoring','subject_main','候選人是主角','新聞/貣文的主角是候選人',0,5)+slider('scoring','subject_mention','候選人被提及','只是順帶提及',0,3)+'</div></div></div>'+
'<div class="section"><div class="section-header"><div class="section-title">事件類型加分</div></div><div class="section-body"><div class="field-grid">'+slider('scoring','evt_controversy','爭議/重大攻防','',0,5)+slider('scoring','evt_election','選舉/提名','',0,4)+slider('scoring','evt_construction','地方建設','',0,4)+slider('scoring','evt_mobilization','組織動員','',0,4)+slider('scoring','evt_policy','政策/質詢','',0,4)+slider('scoring','evt_service','服務行程','',0,3)+slider('scoring','evt_media','媒體曝光','',0,3)+slider('scoring','evt_general','一般報導','',0,2)+'</div></div></div>'+
'<div class="section"><div class="section-header"><div class="section-title">擴散性</div></div><div class="section-body"><div class="field-grid">'+slider('scoring','spread_multi','多平台同步','',0,5)+slider('scoring','spread_single_high','單平台高互動','',0,3)+slider('scoring','spread_single_low','單篇低互動','',0,2)+'</div></div></div>'+
'<div class="section"><div class="section-header"><div class="section-title">來源可信度</div></div><div class="section-body"><div class="field-grid">'+slider('scoring','cred_media','主流媒體/官方','',0,5)+slider('scoring','cred_social','社群/地方粉專','',0,3)+slider('scoring','cred_unknown','匿名/來源不明','',0,2)+'</div></div></div>'+

function rmKw(key,word){var idx=C[key].indexOf(word);if(idx>-1){C[key].splice(idx,1);mark();go(cur);}}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
