<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選情雷達｜後台設定</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--sf3:#2a2f45;--bd:#333856;--tx:#e8eaf6;--mu:#8892b0;--ac:#64ffda;--da:#ff6b6b;--go:#ffd166;--gr:#06d6a0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--sf);border-right:1px solid var(--bd);position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 14px;border-bottom:1px solid var(--bd)}.logo h1{font-size:15px;font-weight:900}.logo h1 span{color:var(--ac)}.logo .ver{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.ns{padding:10px 0}.nl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:2px;padding:5px 18px;font-weight:700}
.ni{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer;color:var(--mu);font-size:13px}.ni:hover{color:var(--tx);background:var(--sf2)}.ni.active{color:var(--ac);background:var(--sf2);border-left:2px solid var(--ac)}
.ic{font-size:15px;width:18px;text-align:center}.main{padding:28px 36px 80px;max-width:980px}
.ph{margin-bottom:24px}.ph h2{font-size:20px;font-weight:900}.ph p{font-size:13px;color:var(--mu);margin-top:4px}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:16px;overflow:hidden}
.sh{padding:13px 18px;border-bottom:1px solid var(--bd);background:var(--sf2)}.st{font-size:13px;font-weight:700}.sd{font-size:11px;color:var(--mu);margin-top:2px}.sb{padding:18px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}.fg3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.fld{display:flex;flex-direction:column;gap:5px}.fld label{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.fld input,.fld select,.fld textarea{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;width:100%}
.fld input:focus,.fld select:focus{border-color:var(--ac)}
.rw{display:flex;align-items:center;gap:8px}.rw input[type=range]{flex:1;accent-color:var(--ac)}.rv{font-family:'DM Mono',monospace;font-size:12px;color:var(--ac);min-width:24px;text-align:right}
.tr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--sf3)}.tr:last-child{border-bottom:none}.tl{font-size:13px}.ts{font-size:11px;color:var(--mu);margin-top:1px}
.tog{position:relative;display:inline-block;width:38px;height:21px;flex-shrink:0}.tog input{opacity:0;width:0;height:0}
.tgs{position:absolute;cursor:pointer;inset:0;background:var(--sf3);border-radius:21px;transition:.2s}
.tgs:before{position:absolute;content:"";height:15px;width:15px;left:3px;bottom:3px;background:var(--mu);border-radius:50%;transition:.2s}
.tog input:checked+.tgs{background:var(--ac)}.tog input:checked+.tgs:before{transform:translateX(17px);background:#000}
.ke{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:10px}.kl{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:26px}
.kt{display:inline-flex;align-items:center;gap:4px;background:var(--sf3);border:1px solid var(--bd);border-radius:4px;padding:2px 7px;font-size:11px;font-family:'DM Mono',monospace}
.kt.harm{border-color:var(--da);color:var(--da)}.kt.ben{border-color:var(--gr);color:var(--gr)}.kt.evt{border-color:#7c83ff;color:#7c83ff}.kt.exc{border-color:var(--go);color:var(--go)}
.kr{cursor:pointer;opacity:.6;line-height:1}.kr:hover{opacity:1}
.ka{display:flex;gap:7px}.ka input{flex:1;background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--tx);font-size:11px;font-family:'DM Mono',monospace;outline:none}.ka input:focus{border-color:var(--ac)}.ka button{background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:5px 10px;color:var(--ac);font-size:11px;cursor:pointer}.ka button:hover{background:var(--ac);color:#000}
.bg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.bc{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:10px;display:flex;flex-direction:column;gap:7px}
.bch{display:flex;justify-content:space-between;align-items:center}.bcn{font-size:11px;font-family:'DM Mono',monospace;color:var(--mu)}
.bc input[type=text]{background:var(--sf3);border:1px solid var(--bd);border-radius:4px;padding:4px 7px;color:var(--tx);font-size:12px;width:100%;outline:none}.bc input[type=text]:focus{border-color:var(--ac)}
.sep{height:1px;background:var(--bd);margin:14px 0}
.scp{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}
.scc{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:9px;text-align:center}
.scv{font-size:18px;font-weight:900;font-family:'DM Mono',monospace}.scv.S{color:#ff6b6b}.scv.A{color:#ffa94d}.scv.B{color:#74c0fc}.scv.C{color:var(--mu)}
.scr{font-size:10px;color:var(--mu);margin-top:2px;font-family:'DM Mono',monospace}
.pr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--sf3)}.pr:last-child{border-bottom:none}
.pi{font-size:16px;width:24px;text-align:center}.pn{min-width:80px;font-size:13px;font-weight:600}
.pu{flex:1}.pu input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:4px 7px;color:var(--mu);font-size:10px;font-family:'DM Mono',monospace;outline:none}.pu input:focus{border-color:var(--ac);color:var(--tx)}
.pb{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.ab{position:fixed;bottom:0;right:0;left:220px;background:var(--sf);border-top:1px solid var(--bd);padding:12px 36px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.ss{font-size:12px;font-family:'DM Mono',monospace}.ss.ok{color:var(--gr)}.ss.ng{color:var(--go)}.br2{display:flex;gap:8px}
.btn{padding:7px 18px;border-radius:6px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.btn-p{background:var(--ac);color:#000}.btn-p:hover{background:#4dd8bb}
.btn-s{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.btn-s:hover{border-color:var(--ac);color:var(--ac)}
.btn-d{background:rgba(255,107,107,.15);color:var(--da);border:1px solid rgba(255,107,107,.3)}
.tst{position:fixed;top:16px;right:16px;background:var(--gr);color:#000;padding:9px 18px;border-radius:7px;font-weight:700;font-size:12px;transform:translateY(-50px);opacity:0;transition:all .3s;z-index:999}.tst.show{transform:none;opacity:1}
</style></head><body>
<div class="layout">
<div class="sidebar">
  <div class="logo"><h1>選情<span>雷達</span> &#x2699;&#xFE0F;</h1><div class="ver">Admin v1.2</div></div>
  <div class="ns"><div class="nl">判讀設定</div>
    <div class="ni active" data-pg="scoring"><span class="ic">&#x1F4CA;</span>評分權重</div>
    <div class="ni" data-pg="keywords"><span class="ic">&#x1F511;</span>關鍵字規則</div>
    <div class="ni" data-pg="filters"><span class="ic">&#x1F6AB;</span>過濾設定</div>
  </div>
  <div class="ns"><div class="nl">前台設定</div>
    <div class="ni" data-pg="buttons"><span class="ic">&#x1F39B;&#xFE0F;</span>篩選按鈕</div>
    <div class="ni" data-pg="platforms"><span class="ic">&#x1F4E1;</span>平台設定</div>
    <div class="ni" data-pg="display"><span class="ic">&#x1F5A5;&#xFE0F;</span>顯示設定</div>
  </div>
  <div class="ns"><div class="nl">系統</div>
    <div class="ni" data-pg="health"><span class="ic">&#x1F50D;</span>系統健康</div>
    <div class="ni" data-pg="export"><span class="ic">&#x1F4BE;</span>匙出/匙入</div>
  </div>
</div>
<div class="main" id="main"></div>
</div>
<div class="ab">
  <div class="ss ok" id="ss">&#x26A1; 設定已載入</div>
  <div class="br2">
    <button class="btn btn-d" id="btn-reset">重置預設値</button>
    <button class="btn btn-s" id="btn-open">開啟前台 &#x2197;</button>
    <button class="btn btn-p" id="btn-save">&#x1F4BE; 儲存設定</button>
  </div>
</div>
<div class="tst" id="tst"></div>
<script>
var DF={"scoring": {"subject_main": 3, "subject_mention": 1, "evt_controversy": 3, "evt_election": 2, "evt_construction": 2, "evt_mobilization": 2, "evt_policy": 2, "evt_service": 1, "evt_media": 1, "evt_general": 1, "spread_multi": 3, "spread_single_high": 2, "spread_single_low": 1, "cred_media": 3, "cred_social": 2, "cred_unknown": 1, "impact_critical": 3, "impact_notable": 2, "impact_record": 1, "recency_active": 2}, "thresholds": {"S": 11, "A": 9, "B": 6}, "signal_harmful": ["爭議", "批評", "攻擊", "指控", "負面", "失言", "危機", "質詢", "弊釜"], "signal_beneficial": ["完工", "第取", "支持", "背書", "當選", "力挺", "推薦", "備選", "通過", "争取到"], "signal_unclear": ["迷因", "諌刺", "傳說", "據說"], "event_controversy": ["爭議", "攻打", "被批", "躨指", "失言", "危機"], "event_election": ["提名", "候選", "選舉", "大選", "選區", "初選"], "event_construction": ["建設", "工程", "道路", "橋樑", "公園", "交通", "高架"], "event_mobilization": ["造勴", "動員", "宣傳", "受氾"], "event_policy": ["政策", "政見", "提案", "質詢", "交通委員"], "event_service": ["服務", "拜訪", "考察", "行程", "陳情"], "relevance_high": ["選舉", "提名", "立委", "縣長", "市長", "問政", "質詢", "交通委員", "彰化縣長", "彰化市長"], "filter_csy_exclude": ["白米", "包材", "農產包材", "農會", "稻米", "自備袋", "員林市", "員林農會", "大峦巫步道", "北溝排水", "八卦山", "步道", "環保考察", "媒祖", "宗教活動", "樂齊", "長照"], "filter_hby_exclude": ["劇橋 非彰化"], "filter_whitelist": ["SayYes", "陳素月委員", "Chen Su-Yueh"], "filter_ig_threads_strict": true, "filter_relevance_must_name": true, "display": {"show_score": true, "show_rel": false, "sort": "level", "per_page": 100, "refresh": 5, "show_low": false}, "filter_buttons": [{"g": "cand", "f": "all", "l": "全部", "on": true}, {"g": "cand", "f": "HBY", "l": "黃柏瑜", "on": true}, {"g": "cand", "f": "CSY", "l": "陳素月", "on": true}, {"g": "sig", "f": "all", "l": "全部", "on": true}, {"g": "sig", "f": "ben", "l": "✅ 有利", "on": true}, {"g": "sig", "f": "har", "l": "❌ 不利", "on": true}, {"g": "sig", "f": "neu", "l": "⚪ 中性", "on": true}, {"g": "sig", "f": "unc", "l": "⚠ 待判讀", "on": true}, {"g": "lev", "f": "all", "l": "全部", "on": true}, {"g": "lev", "f": "S", "l": "S 立即", "on": true}, {"g": "lev", "f": "A", "l": "A 高度", "on": true}, {"g": "lev", "f": "B", "l": "B 追蹤", "on": true}, {"g": "lev", "f": "C", "l": "C 存檔", "on": false}, {"g": "src", "f": "all", "l": "全部", "on": true}, {"g": "src", "f": "FB2", "l": "Facebook", "on": true}, {"g": "src", "f": "IG2", "l": "Instagram", "on": true}, {"g": "src", "f": "TH", "l": "Threads", "on": true}, {"g": "src", "f": "PT", "l": "PTT", "on": true}, {"g": "src", "f": "GO", "l": "Google", "on": true}], "platforms": [{"id": "FB", "nm": "Facebook", "ic": "FB", "on": true, "sp": "site:facebook.com", "cr": "medium"}, {"id": "IG", "nm": "Instagram", "ic": "IG", "on": true, "sp": "site:instagram.com", "cr": "medium"}, {"id": "Threads", "nm": "Threads", "ic": "Th", "on": true, "sp": "site:threads.net", "cr": "medium"}, {"id": "PTT", "nm": "PTT", "ic": "PT", "on": true, "sp": "site:ptt.cc", "cr": "low"}, {"id": "Google", "nm": "Google", "ic": "GG", "on": true, "sp": "", "cr": "high"}]};
var C={},pg="scoring";
function cl(o){return JSON.parse(JSON.stringify(o));}
function mg(t,s){for(var k in s){if(!(k in t))t[k]=cl(s[k]);else if(typeof s[k]==="object"&&!Array.isArray(s[k])&&s[k]!==null){if(typeof t[k]!=="object")t[k]={};mg(t[k],s[k]);}}}
function load(){var sv=localStorage.getItem("emcfg");if(sv){try{C=JSON.parse(sv);mg(C,DF);}catch(e){C=cl(DF);}}else{C=cl(DF);}render();}
function mkd(){var e=document.getElementById("ss");e.textContent="⚠ 有未儲存的變更";e.className="ss ng";}
function save(){localStorage.setItem("emcfg",JSON.stringify(C));var e=document.getElementById("ss");e.textContent="✅ 設定已儲存";e.className="ss ok";tst("設定已儲存！前台重整後生效");}
function tst(m){var t=document.getElementById("tst");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function go(p){pg=p;document.querySelectorAll(".ni").forEach(function(n){n.classList.toggle("active",n.dataset.pg===p);});render();}
function sl(k,l,mn,mx){
  var v=C.scoring[k]!==undefined?C.scoring[k]:0;
  return '<div class="fld"><label>'+l+'</label>'
    +'<div class="rw"><input type="range" min="'+mn+'" max="'+mx+'" value="'+v+'" data-sk="'+k+'">'
    +'<span class="rv" id="rv-'+k+'">'+v+'</span></div></div>';
}
function kws(ti,de,k,tp){
  var w=C[k]||[];
  var tags=w.map(function(x){
    return '<span class="kt '+tp+'">'+esc(x)
      +'<span class="kr" data-rk="'+k+'" data-rw="'+esc(x)+'">x</span></span>';
  }).join('');
  var empty='<span style="color:var(--mu);font-size:11px">(\u7a7a)</span>';
  return '<div class="sec"><div class="sh"><div class="st">'+ti+'</div>'
    +'<div class="sd">'+de+'</div></div><div class="sb"><div class="ke">'
    +'<div class="kl">'+(tags||empty)+'</div>'
    +'<div class="ka"><input type="text" data-ak="'+k+'" placeholder="\u8f38\u5165\u95dc\u9375\u5b57">'
    +'<button data-ab="'+k+'">+</button></div>'
    +'</div></div></div>';
}
function exs(ti,de,k){
  var w=C[k]||[];
  var tags=w.map(function(x){
    return '<span class="kt exc">'+esc(x)
      +'<span class="kr" data-rk="'+k+'" data-rw="'+esc(x)+'">x</span></span>';
  }).join('');
  var empty='<span style="color:var(--mu);font-size:11px">(\u7a7a)</span>';
  return '<div class="sec"><div class="sh"><div class="st">'+ti+'</div>'
    +'<div class="sd">'+de+'</div></div><div class="sb"><div class="ke">'
    +'<div class="kl">'+(tags||empty)+'</div>'
    +'<div class="ka"><input type="text" data-ak="'+k+'" placeholder="\u65b0\u589e\u6392\u9664\u8a5e">'
    +'<button data-ab="'+k+'">+</button></div>'
    +'</div></div></div>';
}
function render(){
  var h='',t=C.thresholds,s=C.scoring,d=C.display;
  if(pg==='scoring'){
    h='<div class="ph"><h2>&#x1F4CA; \u8a55\u5206\u6b0a\u91cd\u8a2d\u5b9a</h2>'
      +'<p>\u8abf\u6574\u5404\u56e0\u5b50\u7684\u5206\u6578\u6b0a\u91cd\uff0c\u5f71\u97ff S/A/B/C \u7b49\u7d1a\u5224\u65b7</p></div>';
    h+='<div class="sec"><div class="sh"><div class="st">\u7b49\u7d1a\u9580\u6edd</div>'
      +'<div class="sd">\u8abf\u6574 S/A/B/C \u7684\u5206\u6578\u9580\u6edd</div></div><div class="sb"><div class="fg3">';
    h+='<div class="fld"><label>S \u7d1a &ge;</label>'
      +'<input type="number" value="'+t.S+'" min="1" max="20" data-tk="S"></div>';
    h+='<div class="fld"><label>A \u7d1a &ge;</label>'
      +'<input type="number" value="'+t.A+'" min="1" max="20" data-tk="A"></div>';
    h+='<div class="fld"><label>B \u7d1a &ge;</label>'
      +'<input type="number" value="'+t.B+'" min="1" max="20" data-tk="B"></div>';
    h+='</div><div class="scp">';
    h+='<div class="scc"><div class="scv S">S</div><div class="scr">&ge; '+t.S+' \u5206<br>\u7acb\u5373\u8655\u7406</div></div>';
    h+='<div class="scc"><div class="scv A">A</div><div class="scr">&ge; '+t.A+' \u5206<br>\u9ad8\u5ea6\u95dc\u6ce8</div></div>';
    h+='<div class="scc"><div class="scv B">B</div><div class="scr">&ge; '+t.B+' \u5206<br>\u6301\u7e8c\u8ffd\u8e64</div></div>';
    h+='<div class="scc"><div class="scv C">C</div><div class="scr">< '+t.B+' \u5206<br>\u5b58\u6a94\u53c3\u8003</div></div>';
    h+='</div></div></div>';
    h+='<div class="sec"><div class="sh"><div class="st">\u4e3b\u9ad4\u6027</div></div><div class="sb"><div class="fg">';
    h+=sl('subject_main','\u5019\u9078\u4eba\u662f\u4e3b\u89d2',0,5)+sl('subject_mention','\u5019\u9078\u4eba\u88ab\u63d0\u53ca',0,3);
    h+='</div></div></div>';
    h+='<div class="sec"><div class="sh"><div class="st">\u4e8b\u4ef6\u985e\u578b\u52a0\u5206</div></div><div class="sb"><div class="fg">';
    h+=sl('evt_controversy','\u722d\u8b70/\u91cd\u5927\u653b\u9632',0,5)+sl('evt_election','\u9078\u8209/\u63d0\u540d',0,4)
      +sl('evt_construction','\u5730\u65b9\u5efa\u8a2d',0,4)+sl('evt_mobilization','\u7d44\u7e54\u52d5\u54e1',0,4)
      +sl('evt_policy','\u653f\u7b56/\u8cea\u8a62',0,4)+sl('evt_service','\u670d\u52d9\u884c\u7a0b',0,3)
      +sl('evt_media','\u5a92\u9ad4\u66dd\u5149',0,3)+sl('evt_general','\u4e00\u822c\u5831\u5c0e',0,2);
    h+='</div></div></div>';
    h+='<div class="sec"><div class="sh"><div class="st">\u64f4\u6563\u6027</div></div><div class="sb"><div class="fg">';
    h+=sl('spread_multi','\u591a\u5e73\u53f0\u540c\u6b65',0,5)+sl('spread_single_high','\u55ae\u5e73\u53f0\u9ad8\u4e92\u52d5',0,3)+sl('spread_single_low','\u55ae\u7bc7\u4f4e\u4e92\u52d5',0,2);
    h+='</div></div></div>';
    h+='<div class="sec"><div class="sh"><div class="st">\u4f86\u6e90\u53ef\u4fe1\u5ea6</div></div><div class="sb"><div class="fg">';
    h+=sl('cred_media','\u4e3b\u6d41\u5a92\u9ad4/\u5b98\u65b9',0,5)+sl('cred_social','\u793e\u7fa4/\u5730\u65b9\u7c89\u5c08',0,3)+sl('cred_unknown','\u533f\u540d/\u4f86\u6e90\u4e0d\u660e',0,2);

function addKw(k,inp){
  var v=inp.value.trim();
  if(!v)return;
  if(!C[k])C[k]=[];
  if(C[k].indexOf(v)===-1){C[k].push(v);mkd();render();}
  inp.value='';
}
function chkS(){
  var l=document.getElementById('hlog');
  l.textContent='\u6aa2\u67e5\u4e2d...';
  var id='1rKfbDPgmjenPuXh3d7BuOffrQzZyrze54Q_uFpBnw_k';
  var td=new Date().toISOString().split('T')[0];
  fetch('https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+td+'&ts='+Date.now())
    .then(function(r){return r.text();})
    .then(function(t){
      var s=t.indexOf('{'),e=t.lastIndexOf('}');
      var j=JSON.parse(t.substring(s,e+1));
      l.textContent='\u2705 Sheets \u9023\u7dda\u6b63\u5e38\n\u4eca\u65e5('+td+')\u8cc7\u6599\uff1a'+(j.table?j.table.rows.length:0)+'\u7b46\n\u6aa2\u67e5\u6642\u9593\uff1a'+new Date().toLocaleString('zh-TW');
    }).catch(function(e){l.textContent='\u274c \u5931\u6557\uff1a'+e.message;});
}
function chkT(){
  var l=document.getElementById('hlog');
  l.textContent='\u6293\u53d6\u4e2d...';
  var id='1rKfbDPgmjenPuXh3d7BuOffrQzZyrze54Q_uFpBnw_k';
  var td=new Date().toISOString().split('T')[0];
  fetch('https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+td+'&ts='+Date.now())
    .then(function(r){return r.text();})
    .then(function(t){
      var s=t.indexOf('{'),e=t.lastIndexOf('}');
      var j=JSON.parse(t.substring(s,e+1));
      var rows=(j.table?j.table.rows:[]).filter(function(r){
        var c=r.c.map(function(x){return x?(x.v||''):'';});
        return c[1]&&c[1]!=='\u5019\u9078\u4eba';
      });
      var src={};
      rows.forEach(function(r){var sv=r.c[7]?(r.c[7].v||""):"";src[sv]=(src[sv]||0)+1;});
      l.textContent='\uD83D\uDCCA \u4eca\u65e5('+td+')\n\u7e3d\u8a08\uff1a'+rows.length+'\u7b46\n'
        +'\u4f86\u6e90\uff1a'+Object.entries(src).map(function(x){return x[0]+':'+x[1];}).join(', ')
        +'\n\n\u524d 5 \u7b46\uff1a\n'
        +rows.slice(0,5).map(function(r,i){return (i+1)+'. '+(r.c[8]?r.c[8].v:'').substring(0,45);}).join('\n');
    }).catch(function(e){l.textContent='\u274c '+e.message;});
}
function bind(){
  document.querySelectorAll('input[data-sk]').forEach(function(e){
    e.addEventListener('input',function(){
      C.scoring[this.dataset.sk]=parseFloat(this.value);
      var r=document.getElementById('rv-'+this.dataset.sk);
      if(r)r.textContent=this.value;
      mkd();
    });
  });
  document.querySelectorAll('input[data-tk]').forEach(function(e){
    e.addEventListener('change',function(){C.thresholds[this.dataset.tk]=parseInt(this.value);mkd();render();});
  });
  document.querySelectorAll('.kr').forEach(function(e){
    e.addEventListener('click',function(){
      var k=this.dataset.rk,w=this.dataset.rw,a=C[k];
      if(!a)return;
      var i=a.indexOf(w);
      if(i>-1){a.splice(i,1);mkd();render();}
    });
  });
  document.querySelectorAll('input[data-ak]').forEach(function(e){
    e.addEventListener('keydown',function(ev){if(ev.key==='Enter')addKw(this.dataset.ak,this);});
  });
  document.querySelectorAll('button[data-ab]').forEach(function(e){
    e.addEventListener('click',function(){
      var k=this.dataset.ab;
      var i=document.querySelector('input[data-ak="'+k+'"]');
      if(i)addKw(k,i);
    });
  });
  document.querySelectorAll('input[data-bc]').forEach(function(e){
    e.addEventListener('change',function(){C[this.dataset.bc]=this.checked;mkd();});
  });
  document.querySelectorAll('input[data-bi]').forEach(function(e){
    e.addEventListener('change',function(){C.filter_buttons[parseInt(this.dataset.bi)].on=this.checked;mkd();});
  });
  document.querySelectorAll('input[data-bl]').forEach(function(e){
    e.addEventListener('change',function(){C.filter_buttons[parseInt(this.dataset.bl)].l=this.value;mkd();});
  });
  document.querySelectorAll('[data-pi]').forEach(function(e){
    e.addEventListener('change',function(){
      var i=parseInt(this.dataset.pi),k=this.dataset.pk;
      if(k==='on')C.platforms[i][k]=this.checked;
      else C.platforms[i][k]=this.value;
      mkd();
    });
  });
  document.querySelectorAll('[data-dc]').forEach(function(e){
    e.addEventListener('change',function(){
      var k=this.dataset.dc;
      if(this.type==='checkbox')C.display[k]=this.checked;
      else if(this.type==='number')C.display[k]=parseInt(this.value);
      else C.display[k]=this.value;
      mkd();
    });
  });
  var hcs=document.getElementById('hcs');if(hcs)hcs.addEventListener('click',chkS);
  var hct=document.getElementById('hct');if(hct)hct.addEventListener('click',chkT);
  var hof=document.getElementById('hof');
  if(hof)hof.addEventListener('click',function(){window.open('https://kellychenichun-glitch.github.io/election-monitor/','_blank');});
  var ecp=document.getElementById('ecp');
  if(ecp)ecp.addEventListener('click',function(){navigator.clipboard.writeText(JSON.stringify(C,null,2));tst('\u5df2\u8907\u88fd\uff01');});
  var eim=document.getElementById('eim');
  if(eim)eim.addEventListener('click',function(){
    var v=document.getElementById('ij').value.trim();
    try{C=JSON.parse(v);mg(C,DF);save();go('scoring');tst('\u5319\u5165\u6210\u529f\uff01');}
    catch(e){alert('JSON \u932f\u8aa4\uff1a'+e.message);}
  });
}
document.querySelectorAll('.ni').forEach(function(n){n.addEventListener('click',function(){go(this.dataset.pg);});});
document.getElementById('btn-save').addEventListener('click',save);
document.getElementById('btn-reset').addEventListener('click',function(){if(!confirm('確定要重置？'))return;C=cl(DF);mkd();render();tst('已重置為預設値');});
document.getElementById('btn-open').addEventListener('click',function(){window.open('https://kellychenichun-glitch.github.io/election-monitor/','_blank');});
load();
