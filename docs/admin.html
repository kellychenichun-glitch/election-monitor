<style>

body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:16px}

var AUTH_KEY = 'em_auth';
var USERS_KEY = 'em_users';

// 預設使用者（第一次使用）
var DEFAULT_USERS = [
  {username:'admin', pwHash: simpleHash('admin123'), role:'admin', created: new Date().toISOString(), lastLogin:'', loginCount:0}
];

function simpleHash(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h = h & h;
  }
  return 'h' + Math.abs(h).toString(16) + str.length.toString(16);
}

function getUsers() {
  try { var u = localStorage.getItem(USERS_KEY); if (u) return JSON.parse(u); } catch(e) {}
  localStorage.setItem(USERS_KEY, JSON.stringify(DEFAULT_USERS));
  return DEFAULT_USERS;
}
function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
  pushUsersToGitHub(users);
}
// === GitHub 使用者同步 ===

  .then(function(r){return r.json();})
  .then(function(d){
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(users,null,2))));
    return fetch('https://api.github.com/repos/kellychenichun-glitch/election-monitor/contents/docs/users.json',{
      method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
      body:JSON.stringify({message:'Update users via admin',content:content,sha:d.sha})
    });
  }).then(function(r){return r.json();})
  .then(function(res){ tst(res.commit ? '使用者已同步 ✅' : '同步失敗'); })
  .catch(function(e){ tst('同步失敗: '+e.message); });
}


function getLogs() {
  try { var l = localStorage.getItem(LOGS_KEY); if (l) return JSON.parse(l); } catch(e) {}
  return [];
}
function addLog(type, user, detail) {
  var logs = getLogs();
  logs.unshift({ type:type, user:user, detail:detail, time: new Date().toLocaleString('zh-TW') });
  if (logs.length > 200) logs = logs.slice(0,200);
  localStorage.setItem(LOGS_KEY, JSON.stringify(logs));
}

function getSession() {
  try { var s = localStorage.getItem(SESSION_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return null;
}
function setSession(username) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({username:username, time:new Date().toISOString()}));
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }

function tryLogin(username, password) {
  var users = getUsers();
  var user = users.find(function(u){ return u.username === username; });
  if (!user) { addLog('fail', username, '\u5e33\u865f\u4e0d\u5b58\u5728'); return false; }
  if (user.pwHash !== simpleHash(password)) { addLog('fail', username, '\u5bc6\u78bc\u932f\u8aa4'); return false; }
  user.lastLogin = new Date().toLocaleString('zh-TW');
  user.loginCount = (user.loginCount || 0) + 1;
  saveUsers(users);
  setSession(username);
  addLog('login', username, '\u767b\u5165\u6210\u529f');
  return true;
}

var C = {}, pg = 'scoring';

function mg(t,s){ for(var k in s){ if(!(k in t))t[k]=cl(s[k]); else if(typeof s[k]==='object'&&!Array.isArray(s[k])&&s[k]!==null){ if(typeof t[k]!=='object')t[k]={}; mg(t[k],s[k]); } } }
function load() {
  var sv = localStorage.getItem('emcfg');
  if (sv) { try { C = JSON.parse(sv); mg(C,DF); } catch(e) { C = cl(DF); } }
  else { C = cl(DF); }
  render();
}

function addKw(k, inp) {
  var v = inp.value.trim();
  if (!v) return;
  if (!C[k]) C[k] = [];
  if (C[k].indexOf(v) === -1) { C[k].push(v); mkd(); render(); }
  inp.value = '';
}

function chkS() {
  var l = document.getElementById('hlog'); l.textContent = '\u6aa2\u67e5\u4e2d...';
  var id = '1rKfbDPgmjenPuXh3d7BuOffrQzZyrze54Q_uFpBnw_k', td = new Date().toISOString().split('T')[0];
  fetch('https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+td+'&ts='+Date.now())
    .then(function(r){ return r.text(); })
    .then(function(t){ var s=t.indexOf('{'),e=t.lastIndexOf('}'),j=JSON.parse(t.substring(s,e+1)); l.textContent='\u2705 Sheets \u9023\u7dda\u6b63\u5e38\n\u4eca\u65e5('+td+')\u8cc7\u6599\uff1a'+(j.table?j.table.rows.length:0)+'\u7b46\n\u6aa2\u67e5\u6642\u9593\uff1a'+new Date().toLocaleString('zh-TW'); })
    .catch(function(e){ l.textContent='\u274c \u5931\u6557\uff1a'+e.message; });
}
function chkT() {
  var l = document.getElementById('hlog'); l.textContent = '\u6293\u53d6\u4e2d...';
  var id = '1rKfbDPgmjenPuXh3d7BuOffrQzZyrze54Q_uFpBnw_k', td = new Date().toISOString().split('T')[0];
  fetch('https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+td+'&ts='+Date.now())
    .then(function(r){ return r.text(); })
    .then(function(t){
      var s=t.indexOf('{'),e=t.lastIndexOf('}'),j=JSON.parse(t.substring(s,e+1));
      var rows=(j.table?j.table.rows:[]).filter(function(r){var c=r.c.map(function(x){return x?(x.v||''):'';});return c[1]&&c[1]!=='\u5019\u9078\u4eba';});
      var src={};rows.forEach(function(r){var sv=r.c[7]?(r.c[7].v||''):'';src[sv]=(src[sv]||0)+1;});
      l.textContent='&#x1F4CA; \u4eca\u65e5('+td+')\n\u7e3d\u8a08\uff1a'+rows.length+'\u7b46\n\u4f86\u6e90\uff1a'+Object.entries(src).map(function(x){return x[0]+':'+x[1];}).join(', ')+'\n\n\u524d 5 \u7b46\uff1a\n'+rows.slice(0,5).map(function(r,i){return (i+1)+'. '+(r.c[8]?r.c[8].v:'').substring(0,45);}).join('\n');
    }).catch(function(e){ l.textContent='\u274c '+e.message; });
}

    e.addEventListener('input', function(){ C.scoring[this.dataset.sk]=parseFloat(this.value); var r=document.getElementById('rv-'+this.dataset.sk); if(r)r.textContent=this.value; mkd(); });
  });
  document.querySelectorAll('input[data-tk]').forEach(function(e){

  });
  document.querySelectorAll('.kr').forEach(function(e){
    e.addEventListener('click', function(){ var k=this.dataset.rk,w=this.dataset.rw,a=C[k]; if(!a)return; var i=a.indexOf(w); if(i>-1){a.splice(i,1);mkd();render();} });
  });
  document.querySelectorAll('input[data-ak]').forEach(function(e){
    e.addEventListener('keydown', function(ev){ if(ev.key==='Enter') addKw(this.dataset.ak,this); });
  });

  });
  document.querySelectorAll('input[data-bc]').forEach(function(e){
    e.addEventListener('change', function(){ C[this.dataset.bc]=this.checked; mkd(); });
  });
  document.querySelectorAll('input[data-bi]').forEach(function(e){
    e.addEventListener('change', function(){ C.filter_buttons[parseInt(this.dataset.bi)].on=this.checked; mkd(); });
  });
  document.querySelectorAll('input[data-bl]').forEach(function(e){
    e.addEventListener('change', function(){ C.filter_buttons[parseInt(this.dataset.bl)].l=this.value; mkd(); });
  });
  document.querySelectorAll('[data-pi]').forEach(function(e){
    e.addEventListener('change', function(){ var i=parseInt(this.dataset.pi),k=this.dataset.pk; if(k==='on')C.platforms[i][k]=this.checked; else C.platforms[i][k]=this.value; mkd(); });
  });
  document.querySelectorAll('[data-dc]').forEach(function(e){
    e.addEventListener('change', function(){ var k=this.dataset.dc; if(this.type==='checkbox')C.display[k]=this.checked; else if(this.type==='number')C.display[k]=parseInt(this.value); else C.display[k]=this.value; mkd(); });
  });
  var hcs=document.getElementById('hcs'); if(hcs) hcs.addEventListener('click',chkS);
  var hct=document.getElementById('hct'); if(hct) hct.addEventListener('click',chkT);
  var hof=document.getElementById('hof'); if(hof) hof.addEventListener('click',function(){ window.open('https://kellychenichun-glitch.github.io/election-monitor/','_blank'); });
  var ecp=document.getElementById('ecp'); if(ecp) ecp.addEventListener('click',function(){ navigator.clipboard.writeText(JSON.stringify(C,null,2)); tst('\u5df2\u8907\u88fd\uff01'); });
  var eim=document.getElementById('eim'); if(eim) eim.addEventListener('click',function(){ var v=document.getElementById('ij').value.trim(); try{C=JSON.parse(v);mg(C,DF);save();go('scoring');tst('\u5319\u5165\u6210\u529f\uff01');}catch(e){alert('JSON \u932f\u8aa4\uff1a'+e.message);} });
  var clrl=document.getElementById('clr-logs'); if(clrl) clrl.addEventListener('click',function(){ if(confirm('\u78ba\u5b9a\u8981\u6e05\u9664\u6240\u6709\u8a18\u9304\uff1f')){ localStorage.removeItem(LOGS_KEY); render(); tst('\u8a18\u9304\u5df2\u6e05\u9664'); } });
  // users
  var sgtok=document.getElementById('save-gh-tok');
  if(sgtok){
    var gti=document.getElementById('gh-tok');
    var existingT=getGHToken();
    if(gti&&existingT)gti.placeholder=existingT.substring(0,8)+'...(已設定)';
    sgtok.addEventListener('click',function(){
      var v=(document.getElementById('gh-tok').value||'').trim();
      if(!v){alert('請輸入 Token');return;}
      localStorage.setItem(GH_TOKEN_KEY,v);
      tst('Token 已儲存！之後使用者變更會自動同步');
      document.getElementById('gh-tok').value='';
      document.getElementById('gh-tok').placeholder=v.substring(0,8)+'...(已設定)';
    });
  }
  var nadd=document.getElementById('nu-add');
  if(nadd) nadd.addEventListener('click',function(){
    var u=document.getElementById('nu-user').value.trim();
    var p=document.getElementById('nu-pass').value.trim();
    var r=document.getElementById('nu-role').value;
    if(!u||!p){alert('\u5e33\u865f\u548c\u5bc6\u78bc\u4e0d\u80fd\u70ba\u7a7a');return;}
    if(p.length<6){alert('\u5bc6\u78bc\u81f3\u5c116\u4f4d');return;}
    var users=getUsers();
    if(users.find(function(x){return x.username===u;})){alert('\u5e33\u865f\u5df2\u5b58\u5728');return;}
    users.push({username:u,pwHash:simpleHash(p),role:r,created:new Date().toLocaleString('zh-TW'),lastLogin:'',loginCount:0});
    saveUsers(users);
    addLog('user',getSession().username,'\u65b0\u589e\u4f7f\u7528\u8005: '+u);
    render(); tst('\u4f7f\u7528\u8005 '+u+' \u5df2\u65b0\u589e\uff01');
  });
  document.querySelectorAll('[data-changepw]').forEach(function(e){
    e.addEventListener('click',function(){
      var idx=parseInt(this.dataset.changepw);
      var users=getUsers();
      var u=users[idx];
      var np=prompt('\u8acb\u8f38\u5165 '+u.username+' \u7684\u65b0\u5bc6\u78bc\uff08\u81f3\u5c116\u4f4d\uff09\uff1a');
      if(!np)return;
      if(np.length<6){alert('\u5bc6\u78bc\u81f3\u5c116\u4f4d');return;}
      users[idx].pwHash=simpleHash(np);
      saveUsers(users);
      addLog('user',getSession().username,'\u4fee\u6539\u5bc6\u78bc: '+u.username);
      tst('\u5bc6\u78bc\u5df2\u66f4\u65b0\uff01');
    });
  });
  document.querySelectorAll('[data-deluser]').forEach(function(e){
    e.addEventListener('click',function(){
      var idx=parseInt(this.dataset.deluser);
      var users=getUsers();
      var u=users[idx];
      if(!confirm('\u78ba\u5b9a\u8981\u522a\u9664\u4f7f\u7528\u8005 '+u.username+' \uff1f'))return;
      users.splice(idx,1);
      saveUsers(users);
      addLog('user',getSession().username,'\u522a\u9664\u4f7f\u7528\u8005: '+u.username);
      render(); tst('\u4f7f\u7528\u8005\u5df2\u522a\u9664\uff01');
    });
  });
}

var NOTIFY_CFG_KEY = 'em_notify';

function getNotifyConfig() {
  try {
    var s = localStorage.getItem(NOTIFY_CFG_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    subscribers: [],
    schedule: {mode:'daily', daily_hour:6, interval_hours:6, enabled:true},
    last_updated: new Date().toISOString().split('T')[0]
  };
}
function saveNotifyConfig(cfg) {
  cfg.last_updated = new Date().toISOString().split('T')[0];
  localStorage.setItem(NOTIFY_CFG_KEY, JSON.stringify(cfg));
}

// ============================================================
// 取得 Sheets 指定日期範圍資料
// ============================================================
var _expCache = {};

function fetchSheetDate(dateStr, cb) {
  if (_expCache[dateStr]) { cb(null, _expCache[dateStr]); return; }
  var id = '1rKfbDPgmjenPuXh3d7BuOffrQzZyrze54Q_uFpBnw_k';
  fetch('https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+dateStr+'&ts='+Date.now())
    .then(function(r){return r.text();})
    .then(function(t){
      try {
        var s=t.indexOf('{'),e=t.lastIndexOf('}');
        var j=JSON.parse(t.substring(s,e+1));
        var rows=(j.table?j.table.rows:[]).filter(function(r){
          var c=r.c.map(function(x){return x?(x.v||''):'';});
          return c[1]&&c[1]!=='\u5019\u9078\u4eba';
        }).map(function(r){
          var c=r.c.map(function(x){return x?(x.v||''):'';});
          return {date:dateStr,time:c[0],candidate:c[1],topic:c[2],stance:c[3],sentiment:c[4],priority:c[5],summary:c[6],source:c[7],title:c[8],url:c[9]};
        });
        _expCache[dateStr] = rows;
        cb(null, rows);
      } catch(e) { cb(e, []); }
    }).catch(function(e){cb(e,[]);});
}

function getDateRange(start, end) {
  var dates = [], cur = new Date(start);
  var endD = new Date(end);
  while (cur <= endD) {
    dates.push(cur.toISOString().split('T')[0]);
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

function fetchAllDates(dates, cb) {
  var allRows = [], done = 0;
  if (!dates.length) { cb([]); return; }
  dates.forEach(function(d) {
    fetchSheetDate(d, function(err, rows) {
      allRows = allRows.concat(rows||[]);
      done++;
      if (done === dates.length) cb(allRows);
    });
  });
}

// ============================================================
// Excel 匯出（用 SheetJS）
// ============================================================
function exportExcel(rows, filename) {
  if (!window.XLSX) {
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    script.onload = function() { doExportExcel(rows, filename); };
    document.head.appendChild(script);
  } else {
    doExportExcel(rows, filename);
  }
}
function doExportExcel(rows, filename) {
  var XLSX = window.XLSX;
  var headers = ['\u65e5\u671f','\u6642\u9593','\u5019\u9078\u4eba','\u4e3b\u984c','\u7acb\u5834','\u8a0a\u865f\u50be\u5411','\u512a\u5148\u7d1a','\u6458\u8981','\u4f86\u6e90','\u6a19\u984c','URL'];
  var data = [headers].concat(rows.map(function(r){
    return [r.date,r.time,r.candidate,r.topic,r.stance,r.sentiment,r.priority,r.summary,r.source,r.title,r.url];
  }));
  var ws = XLSX.utils.aoa_to_sheet(data);
  // 欄寬
  ws['!cols'] = [{wch:12},{wch:8},{wch:8},{wch:20},{wch:8},{wch:10},{wch:6},{wch:40},{wch:10},{wch:50},{wch:30}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '\u9078\u60c5\u8cc7\u6599');
  XLSX.writeFile(wb, filename);
  tst('Excel \u5319\u51fa\u6210\u529f\uff01');
}

// ============================================================
// Word 匯出（生成 HTML blob 存為 .doc）
// ============================================================
function exportWord(rows, filename, startDate, endDate) {
  // 按候選人分組
  var byDate = {};
  rows.forEach(function(r) {
    if (!byDate[r.date]) byDate[r.date] = [];
    byDate[r.date].push(r);
  });

  var body = '<html xmlns:o="urn:schemas-microsoft-com:office:office" '
    + 'xmlns:w="urn:schemas-microsoft-com:office:word" '
    + 'xmlns="http://www.w3.org/TR/REC-html40"><head>'
    + '<meta charset="UTF-8">'
    + '<style>'
    + 'body{font-family:"\u5fae\u8edf\u6b63\u9ed1\u9ad4",sans-serif;font-size:12pt;margin:2cm}'
    + 'h1{font-size:18pt;text-align:center;border-bottom:2px solid #000;padding-bottom:6pt}'
    + 'h2{font-size:14pt;background:#f0f0f0;padding:4pt 8pt;margin-top:16pt}'
    + 'h3{font-size:12pt;color:#333;margin-top:10pt}'
    + 'table{width:100%;border-collapse:collapse;margin:8pt 0;font-size:10pt}'
    + 'th{background:#1a1a1a;color:#fff;padding:5pt 8pt;text-align:left}'
    + 'td{padding:4pt 8pt;border:1px solid #ccc;vertical-align:top}'
    + 'tr:nth-child(even){background:#f9f9f9}'
    + '.S{color:#cc2200;font-weight:bold}.A{color:#cc6600;font-weight:bold}'
    + '.B{color:#0055aa}.C{color:#666}'
    + '.ben{color:#007744}.har{color:#cc2200}.neu{color:#666}.unc{color:#cc8800}'
    + '</style></head><body>';

  body += '<h1>\u5f70\u5316\u9078\u60c5\u76e3\u63a7\u65e5\u5831</h1>';
  body += '<p style="text-align:center;color:#666">\u6e96\u7528\u65e5\u671f\uff1a' + startDate + ' \u81f3 ' + endDate + '&nbsp;&nbsp;|\u5171 ' + rows.length + ' \u7b46\u8cc7\u6599</p>';

  var dates = Object.keys(byDate).sort();
  dates.forEach(function(date) {
    var dayRows = byDate[date];
    body += '<h2>' + date + '&nbsp;&nbsp;(' + dayRows.length + ' \u7b46)</h2>';

    // 統計
    var hby = dayRows.filter(function(r){return r.candidate==='\u9ec3\u67cf\u745c';}).length;
    var csy = dayRows.filter(function(r){return r.candidate==='\u9673\u7d20\u6708';}).length;
    var harCount = dayRows.filter(function(r){return r.sentiment==='negative'||r.sentiment==='har';}).length;
    body += '<p>\u9ec3\u67cf\u745c: ' + hby + ' \u7b46\uff0c\u9673\u7d20\u6708: ' + csy + ' \u7b46\uff0c\u4e0d\u5229\u8a0a\u865f: ' + harCount + ' \u7b46</p>';

    body += '<table><tr><th>\u6642\u9593</th><th>\u5019\u9078\u4eba</th><th>\u4e3b\u984c</th><th>\u8a0a\u865f</th><th>\u512a\u5148\u7d1a</th><th>\u6458\u8981</th><th>\u4f86\u6e90</th></tr>';
    dayRows.forEach(function(r) {
      var sig = r.sentiment === 'positive' || r.sentiment === 'ben' ? 'ben' :
                r.sentiment === 'negative' || r.sentiment === 'har' ? 'har' :
                r.sentiment === 'unc' ? 'unc' : 'neu';
      var sigLabel = {ben:'\u2705 \u6709\u5229', har:'\u274c \u4e0d\u5229', neu:'\u26aa \u4e2d\u6027', unc:'\u26a0 \u5f85\u5224\u8b80'}[sig] || sig;
      body += '<tr><td>' + r.time + '</td>'
        + '<td>' + r.candidate + '</td>'
        + '<td>' + r.topic + '</td>'
        + '<td class="' + sig + '">' + sigLabel + '</td>'
        + '<td class="' + (r.priority||'C') + '">' + (r.priority||'C') + '</td>'
        + '<td>' + r.summary + '</td>'
        + '<td>' + r.source + '</td></tr>';
    });
    body += '</table>';
  });

  body += '</body></html>';
  var blob = new Blob([body], {type:'application/msword'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  tst('Word \u5319\u51fa\u6210\u529f\uff01');
}

// bind 補充（訂閱 + 匯出）
// ============================================================
var _origBind = bind;
bind = function() {
  _origBind();

  // 訂閱頁
  var addSubBtn = document.getElementById('add-sub-btn');
  if (addSubBtn) {
    addSubBtn.addEventListener('click', function(){
      var email = document.getElementById('new-sub-email').value.trim();
      if (!email || email.indexOf('@') < 0) { alert('\u8acb\u8f38\u5165\u6b63\u78ba\u7684 Email'); return; }
      var cfg = getNotifyConfig();
      if (cfg.subscribers.find(function(s){return s.email===email;})) { alert('Email \u5df2\u5b58\u5728'); return; }
      cfg.subscribers.push({email:email, enabled:true, created:new Date().toISOString().split('T')[0]});
      saveNotifyConfig(cfg);
      addLog('user', getSession().username, '\u65b0\u589e\u8a02\u95b1: '+email);
      ejNotify('sub', email);
      render();
      tst(email + ' \u5df2\u52a0\u5165\u8a02\u95b1\uff01');
    });
    document.getElementById('new-sub-email').addEventListener('keydown', function(e){
      if(e.key==='Enter') document.getElementById('add-sub-btn').click();
    });
  }

  document.querySelectorAll('[data-tog-sub]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var idx = parseInt(this.dataset.togSub);
      var cfg = getNotifyConfig();
      cfg.subscribers[idx].enabled = !cfg.subscribers[idx].enabled;
      saveNotifyConfig(cfg);
      render();
    });
  });
  document.querySelectorAll('[data-resend]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var cfg=getNotifyConfig();
      var sub=cfg.subscribers[parseInt(this.dataset.resend)];
      if(sub&&sub.email) ejNotify('sub', sub.email);
    });
  });
  document.querySelectorAll('[data-del-sub]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var idx = parseInt(this.dataset.delSub);
      var cfg = getNotifyConfig();
      var email = cfg.subscribers[idx].email;
      if (!confirm('\u78ba\u5b9a\u8981\u53d6\u6d88 '+email+' \u7684\u8a02\u95b1\uff1f')) return;
      cfg.subscribers.splice(idx, 1);
      saveNotifyConfig(cfg);
      ejNotify('unsub', email);
      addLog('user', getSession().username, '\u53d6\u6d88\u8a02\u95b1: '+email);
      render();
      tst('\u5df2\u53d6\u6d88\u8a02\u95b1');
    });
  });
  var saveNotifyBtn = document.getElementById('save-notify-btn');
  if (saveNotifyBtn) {
    saveNotifyBtn.addEventListener('click', function(){
      var cfg = getNotifyConfig();
      var mode = document.getElementById('sc-mode').value;
      cfg.schedule = {
        mode: mode,
        daily_hour: parseInt(document.getElementById('sc-daily-hour').value) || 6,
        interval_hours: parseInt(document.getElementById('sc-interval').value) || 6,
        enabled: document.getElementById('sc-enabled').checked
      };
      saveNotifyConfig(cfg);
      addLog('save', getSession().username, '\u5132\u5b58\u8a02\u95b1\u8a2d\u5b9a');
      tst('\u8a02\u95b1\u8a2d\u5b9a\u5df2\u5132\u5b58\uff01');
    });
  }

  // 匯出頁
  var expPreview = document.getElementById('exp-preview');
  if (expPreview) {
    expPreview.addEventListener('click', function(){
      var start = document.getElementById('exp-start').value;
      var end = document.getElementById('exp-end').value;
      if (!start || !end) { alert('\u8acb\u9078\u64c7\u65e5\u671f'); return; }
      var box = document.getElementById('exp-preview-box');
      box.textContent = '\u8f09\u5165\u4e2d...';
      var dates = getDateRange(start, end);
      fetchAllDates(dates, function(rows){
        if (!rows.length) { box.textContent = '\u9078\u5b9a\u65e5\u671f\u7bc4\u570b\u5167\u7121\u8cc7\u6599'; return; }
        var byDate = {};
        rows.forEach(function(r){ byDate[r.date]=(byDate[r.date]||0)+1; });
        var summary = '\u5171 ' + rows.length + ' \u7b46\u8cc7\u6599\n';
        Object.keys(byDate).sort().forEach(function(d){ summary += d + ': ' + byDate[d] + ' \u7b46\n'; });
        box.textContent = summary;
        window._expRows = rows;
        window._expStart = start;
        window._expEnd = end;
      });
    });
  }
  var expExcel = document.getElementById('exp-excel');
  if (expExcel) {
    expExcel.addEventListener('click', function(){
      if (!window._expRows || !window._expRows.length) {
        alert('\u8acb\u5148\u9ede\u64ca\u300c\u9810\u89bd\u8cc7\u6599\u300d'); return;
      }
      var fn = '\u9078\u60c5\u8cc7\u6599_' + window._expStart + '_' + window._expEnd + '.xlsx';
      exportExcel(window._expRows, fn);
    });
  }
  var expWord = document.getElementById('exp-word');
  if (expWord) {
    expWord.addEventListener('click', function(){
      if (!window._expRows || !window._expRows.length) {
        alert('\u8acb\u5148\u9ede\u64ca\u300c\u9810\u89bd\u8cc7\u6599\u300d'); return;
      }
      var fn = '\u9078\u60c5\u65e5\u5831_' + window._expStart + '_' + window._expEnd + '.doc';
      exportWord(window._expRows, fn, window._expStart, window._expEnd);
    });
  }
};
