<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選情雷達｜後台設定</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--sf3:#2a2f45;--bd:#333856;--tx:#e8eaf6;--mu:#8892b0;--ac:#64ffda;--ac2:#7c83ff;--da:#ff6b6b;--go:#ffd166;--gr:#06d6a0;--pu:#c77dff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--sf);border-right:1px solid var(--bd);position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 14px;border-bottom:1px solid var(--bd)}
.logo h1{font-size:15px;font-weight:900}.logo h1 span{color:var(--ac)}
.logo .ver{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.nav-sec{padding:10px 0}
.nav-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:2px;padding:5px 18px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer;color:var(--mu);font-size:13px}
.nav-item:hover{color:var(--tx);background:var(--sf2)}
.nav-item.active{color:var(--ac);background:var(--sf2);border-left:2px solid var(--ac)}
.ni{font-size:15px;width:18px;text-align:center}
.main{padding:28px 36px 80px;max-width:980px}
.ph{margin-bottom:24px}.ph h2{font-size:20px;font-weight:900}.ph p{font-size:13px;color:var(--mu);margin-top:4px}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:16px;overflow:hidden}
.sh{padding:13px 18px;border-bottom:1px solid var(--bd);background:var(--sf2)}
.st{font-size:13px;font-weight:700}.sd{font-size:11px;color:var(--mu);margin-top:2px}
.sb{padding:18px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.fg3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.fld input,.fld select,.fld textarea{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;width:100%}
.fld input:focus,.fld select:focus{border-color:var(--ac)}
.fld textarea{resize:vertical;min-height:70px;font-family:'DM Mono',monospace;font-size:11px}
.hint{font-size:11px;color:var(--mu)}
.rw{display:flex;align-items:center;gap:8px}
.rw input[type=range]{flex:1;accent-color:var(--ac)}
.rv{font-family:'DM Mono',monospace;font-size:12px;color:var(--ac);min-width:24px;text-align:right}
.tr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--sf3)}
.tr:last-child{border-bottom:none}
.tl{font-size:13px}.ts{font-size:11px;color:var(--mu);margin-top:1px}
.tog{position:relative;display:inline-block;width:38px;height:21px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tgs{position:absolute;cursor:pointer;inset:0;background:var(--sf3);border-radius:21px;transition:.2s}
.tgs:before{position:absolute;content:"";height:15px;width:15px;left:3px;bottom:3px;background:var(--mu);border-radius:50%;transition:.2s}
.tog input:checked+.tgs{background:var(--ac)}
.tog input:checked+.tgs:before{transform:translateX(17px);background:#000}
.ke{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:10px}
.kl{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:26px}
.kt{display:inline-flex;align-items:center;gap:4px;background:var(--sf3);border:1px solid var(--bd);border-radius:4px;padding:2px 7px;font-size:11px;font-family:'DM Mono',monospace}
.kt.harm{border-color:var(--da);color:var(--da)}.kt.ben{border-color:var(--gr);color:var(--gr)}
.kt.evt{border-color:var(--ac2);color:var(--ac2)}.kt.exc{border-color:var(--go);color:var(--go)}
.kr{cursor:pointer;opacity:.6;line-height:1}.kr:hover{opacity:1}
.ka{display:flex;gap:7px}
.ka input{flex:1;background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:5px 8px;color:var(--tx);font-size:11px;font-family:'DM Mono',monospace;outline:none}
.ka input:focus{border-color:var(--ac)}
.ka button{background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:5px 10px;color:var(--ac);font-size:11px;cursor:pointer}
.ka button:hover{background:var(--ac);color:#000}
.bg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.bc{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:10px;display:flex;flex-direction:column;gap:7px}
.bch{display:flex;justify-content:space-between;align-items:center}
.bcn{font-size:11px;font-family:'DM Mono',monospace;color:var(--mu)}
.bc input[type=text]{background:var(--sf3);border:1px solid var(--bd);border-radius:4px;padding:4px 7px;color:var(--tx);font-size:12px;width:100%;outline:none;font-family:'Noto Sans TC',sans-serif}
.bc input[type=text]:focus{border-color:var(--ac)}
.sep{height:1px;background:var(--bd);margin:14px 0}
.scp{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}
.scc{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:9px;text-align:center}
.scv{font-size:18px;font-weight:900;font-family:'DM Mono',monospace}
.scv.S{color:#ff6b6b}.scv.A{color:#ffa94d}.scv.B{color:#74c0fc}.scv.C{color:var(--mu)}
.scr{font-size:10px;color:var(--mu);margin-top:2px;font-family:'DM Mono',monospace}
.pr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--sf3)}
.pr:last-child{border-bottom:none}
.pi{font-size:16px;width:24px;text-align:center}
.pn{min-width:80px;font-size:13px;font-weight:600}
.pu{flex:1}.pu input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:4px 7px;color:var(--mu);font-size:10px;font-family:'DM Mono',monospace;outline:none}
.pu input:focus{border-color:var(--ac);color:var(--tx)}
.pb{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.ab{position:fixed;bottom:0;right:0;left:220px;background:var(--sf);border-top:1px solid var(--bd);padding:12px 36px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.ss{font-size:12px;font-family:'DM Mono',monospace}
.ss.ok{color:var(--gr)}.ss.ng{color:var(--go)}
.br2{display:flex;gap:8px}
.btn{padding:7px 18px;border-radius:6px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.btn-p{background:var(--ac);color:#000}.btn-p:hover{background:#4dd8bb}
.btn-s{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.btn-s:hover{border-color:var(--ac);color:var(--ac)}
.btn-d{background:rgba(255,107,107,.15);color:var(--da);border:1px solid rgba(255,107,107,.3)}
.tst{position:fixed;top:16px;right:16px;background:var(--gr);color:#000;padding:9px 18px;border-radius:7px;font-weight:700;font-size:12px;transform:translateY(-50px);opacity:0;transition:all .3s;z-index:999}
.tst.show{transform:none;opacity:1}
</style></head><body>
<div class="layout">
<div class="sidebar">
  <div class="logo"><h1>選情<span>雷達</span> ⚙️</h1><div class="ver">Admin Panel v1.1</div></div>
  <div class="nav-sec">
    <div class="nav-lbl">判讀設定</div>
    <div class="nav-item active" data-pg="scoring"><span class="ni">📊</span>評分權重</div>
    <div class="nav-item" data-pg="keywords"><span class="ni">🔑</span>關鍵字規則</div>
    <div class="nav-item" data-pg="filters"><span class="ni">🚫</span>過濾設定</div>
  </div>
  <div class="nav-sec">
    <div class="nav-lbl">前台設定</div>
    <div class="nav-item" data-pg="buttons"><span class="ni">🎛️</span>篩選按鈕</div>
    <div class="nav-item" data-pg="platforms"><span class="ni">📡</span>平台設定</div>
    <div class="nav-item" data-pg="display"><span class="ni">🖥️</span>顯示設定</div>
  </div>
  <div class="nav-sec">
    <div class="nav-lbl">系統</div>
    <div class="nav-item" data-pg="health"><span class="ni">🔍</span>系統健康</div>
    <div class="nav-item" data-pg="export"><span class="ni">💾</span>匙出/匙入</div>
  </div>
</div>
<div class="main" id="main"></div>
</div>
<div class="ab">
  <div class="ss ok" id="ss">⚡ 設定已載入</div>
  <div class="br2">
    <button class="btn btn-d" id="btn-reset">重置預設値</button>
    <button class="btn btn-s" id="btn-open">開啟前台 ↗</button>
    <button class="btn btn-p" id="btn-save">💾 儲存設定</button>
  </div>
</div>
<div class="tst" id="tst"></div><script>
var DF={scoring:{subject_main:3,subject_mention:1,evt_controversy:3,evt_election:2,evt_construction:2,evt_mobilization:2,evt_policy:2,evt_service:1,evt_media:1,evt_general:1,spread_multi:3,spread_single_high:2,spread_single_low:1,cred_media:3,cred_social:2,cred_unknown:1,impact_critical:3,impact_notable:2,impact_record:1,recency_active:2},thresholds:{S:11,A:9,B:6},signal_harmful:["爭議","批評","攻擊","指控","負面","失言","危機","質詢","弊釜賣"],signal_beneficial:["完工","第取","支持","背書","當選","力挺","推薦","備選","通過","争取到"],signal_unclear:["迷因","諌刺","傳說","據說"],event_controversy:["爭議","攻打","被批","躨指","失言","危機"],event_election:["提名","備選","選舉","大選","選區","初選"],event_construction:["建設","工程","道路","橋樑","公園","交通","高架"],event_mobilization:["造勴","動員","宣傳","受氾"],event_policy:["政策","政見","提案","質詢","交通委員"],event_service:["服務","拜訪","考察","行程","陳情"],relevance_high:["選舉","提名","立委","縣長","市長","問政","質詢","交通委員","彰化縣長","彰化市長"],filter_csy_exclude:["白米","包材","農產包材","農會","稻米","自備袋","員林市","員林農會","大峦巫步道","北溝排水","八卦山","步道","環保考察","媒祖","宗教活動","樂齊","長照"],filter_hby_exclude:["劇橋非彰化"],filter_whitelist:["SayYes","陳素月委員","Chen Su-Yueh"],filter_ig_threads_strict:true,filter_relevance_must_name:true,filter_buttons:[{g:"cand",f:"all",l:"全部",on:true},{g:"cand",f:"HBY",l:"黃柏瑜",on:true},{g:"cand",f:"CSY",l:"陳素月",on:true},{g:"sig",f:"all",l:"全部",on:true},{g:"sig",f:"ben",l:"✅ 有利",on:true},{g:"sig",f:"har",l:"❌ 不利",on:true},{g:"sig",f:"neu",l:"⚪ 中性",on:true},{g:"sig",f:"unc",l:"⚠ 待判讀",on:true},{g:"lev",f:"all",l:"全部",on:true},{g:"lev",f:"S",l:"S 立即",on:true},{g:"lev",f:"A",l:"A 高度",on:true},{g:"lev",f:"B",l:"B 追蹤",on:true},{g:"lev",f:"C",l:"C 存檔",on:false},{g:"src",f:"all",l:"全部",on:true},{g:"src",f:"FB2",l:"Facebook",on:true},{g:"src",f:"IG2",l:"Instagram",on:true},{g:"src",f:"TH",l:"Threads",on:true},{g:"src",f:"PT",l:"PTT",on:true},{g:"src",f:"GO",l:"Google",on:true}],display:{show_score:true,show_rel:false,sort:"level",per_page:100,refresh:5,show_low:false},platforms:[{id:"FB",nm:"Facebook",ic:"📘",on:true,sp:"site:facebook.com",cr:"medium"},{id:"IG",nm:"Instagram",ic:"📸",on:true,sp:"site:instagram.com",cr:"medium"},{id:"Threads",nm:"Threads",ic:"🧵",on:true,sp:"site:threads.net",cr:"medium"},{id:"PTT",nm:"PTT",ic:"💬",on:true,sp:"site:ptt.cc",cr:"low"},{id:"Google",nm:"Google",ic:"🔍",on:true,sp:"",cr:"high"}]};
var C={},dirty=false,pg="scoring";
function cl(o){return JSON.parse(JSON.stringify(o));}
function mg(t,s){for(var k in s){if(!(k in t))t[k]=cl(s[k]);else if(typeof s[k]==="object"&&!Array.isArray(s[k])&&s[k]!==null){if(typeof t[k]!=="object")t[k]={};mg(t[k],s[k]);}}}
function load(){var s=localStorage.getItem("emcfg");if(s){try{C=JSON.parse(s);mg(C,DF);}catch(e){C=cl(DF);}}else{C=cl(DF);}render();}
function mkd(){dirty=true;var e=document.getElementById("ss");e.textContent="⚠ 有未儲存的變更";e.className="ss ng";}
function save(){localStorage.setItem("emcfg",JSON.stringify(C));dirty=false;var e=document.getElementById("ss");e.textContent="✅ 設定已儲存";e.className="ss ok";tst("設定已儲存！前台重整後生效");}
function tst(m){var t=document.getElementById("tst");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function go(p){pg=p;document.querySelectorAll(".nav-item").forEach(function(n){n.classList.toggle("active",n.dataset.pg===p);});render();}
function render(){
  var h="";
  if(pg==="scoring")h=rSc();
  else if(pg==="keywords")h=rKw();
  else if(pg==="filters")h=rFl();
  else if(pg==="buttons")h=rBt();
  else if(pg==="platforms")h=rPl();
  else if(pg==="display")h=rDp();
  else if(pg==="health")h=rHl();
  else if(pg==="export")h=rEx();
  document.getElementById("main").innerHTML=h;
  bind();
}
function sl(k,l,mn,mx){var v=C.scoring[k]!==undefined?C.scoring[k]:0;return '<div class="fld"><label>'+l+'</label><div class="rw"><input type="range" min="'+mn+'" max="'+mx+'" value="'+v+'" data-sk="'+k+'"><span class="rv" id="rv-'+k+'">'+v+'</span></div></div>';}
function rSc(){var s=C.scoring,t=C.thresholds;
return '<div class="ph"><h2>📊 評分權重設定</h2><p>調整各因子的分數權重，影響 S/A/B/C 等級判斷</p></div>'+
'<div class="sec"><div class="sh"><div class="st">等級門滝</div><div class="sd">調整 S/A/B/C 的分數門滝</div></div><div class="sb"><div class="fg3">'+
'<div class="fld"><label>S 級 ≥</label><input type="number" value="'+t.S+'" min="1" max="20" data-tk="S"></div>'+
'<div class="fld"><label>A 級 ≥</label><input type="number" value="'+t.A+'" min="1" max="20" data-tk="A"></div>'+
'<div class="fld"><label>B 級 ≥</label><input type="number" value="'+t.B+'" min="1" max="20" data-tk="B"></div>'+
'</div><div class="scp">'+
'<div class="scc"><div class="scv S">S</div><div class="scr">≥ '+t.S+' 分<br>立即處理</div></div>'+
'<div class="scc"><div class="scv A">A</div><div class="scr">≥ '+t.A+' 分<br>高度關注</div></div>'+
'<div class="scc"><div class="scv B">B</div><div class="scr">≥ '+t.B+' 分<br>持續追蹤</div></div>'+
'<div class="scc"><div class="scv C">C</div><div class="scr">< '+t.B+' 分<br>存檔參考</div></div>'+
'</div></div></div>'+
'<div class="sec"><div class="sh"><div class="st">主體性</div></div><div class="sb"><div class="fg">'+sl("subject_main","候選人是主角",0,5)+sl("subject_mention","候選人被提及",0,3)+'</div></div></div>'+
'<div class="sec"><div class="sh"><div class="st">事件類型加分</div></div><div class="sb"><div class="fg">'+sl("evt_controversy","爭議/重大攻防",0,5)+sl("evt_election","選舉/提名",0,4)+sl("evt_construction","地方建設",0,4)+sl("evt_mobilization","組織動員",0,4)+sl("evt_policy","政策/質詢",0,4)+sl("evt_service","服務行程",0,3)+sl("evt_media","媒體曝光",0,3)+sl("evt_general","一般報導",0,2)+'</div></div></div>'+
'<div class="sec"><div class="sh"><div class="st">擴散性</div></div><div class="sb"><div class="fg">'+sl("spread_multi","多平台同步",0,5)+sl("spread_single_high","單平台高互動",0,3)+sl("spread_single_low","單篇低互動",0,2)+'</div></div></div>'+
'<div class="sec"><div class="sh"><div class="st">來源可信度</div></div><div class="sb"><div class="fg">'+sl("cred_media","主流媒體/官方",0,5)+sl("cred_social","社群/地方粉專",0,3)+sl("cred_unknown","匿名/來源不明",0,2)+'</div></div></div>'+
'<div class="sec"><div class="sh"><div class="st">選情影響力</div></div><div class="sb"><div class="fg">'+sl("impact_critical","可能影響支持度/需回應",0,5)+sl("impact_notable","値得關注/可當素材",0,3)+sl("impact_record","僅記錄用途",0,2)+sl("recency_active","24hr內持續發酵",0,3)+'</div></div></div>';}
function kws(t,d,k,tp){var w=C[k]||[];
  var tags=w.map(function(x){return '<span class="kt '+tp+'">'+esc(x)+'<span class="kr" data-rk="'+k+'" data-rw="'+esc(x)+'">x</span></span>';}).join('');
  return '<div class="sec"><div class="sh"><div class="st">'+t+'</div><div class="sd">'+d+'</div></div><div class="sb"><div class="ke"><div class="kl">'+(tags||'<span style="color:var(--mu);font-size:11px">(空)</span>')+'</div>'+
  '<div class="ka"><input type="text" data-ak="'+k+'" placeholder="輸入關鍵字 + Enter"><button data-ab="'+k+'">+</button></div></div></div></div>';}
function rKw(){return '<div class="ph"><h2>🔑 關鍵字規則</h2><p>設定判斷訊號傾向、事件類型的關鍵字</p></div>'+
  kws("不利訊號關鍵字","出現這些詞 → 判斷為不利訊號","signal_harmful","harm")+
  kws("有利訊號關鍵字","出現這些詞 → 判斷為有利訊號","signal_beneficial","ben")+
  kws("待判讀關鍵字","出現這些詞 → 需人工判斷","signal_unclear","evt")+
  '<div class="sep"></div>'+
  kws("爭議事件關鍵字","","event_controversy","harm")+
  kws("選舉提名關鍵字","","event_election","evt")+
  kws("地方建設關鍵字","","event_construction","ben")+
  kws("政策質詢關鍵字","","event_policy","evt")+
  kws("服務行程關鍵字","","event_service","ben")+
  '<div class="sep"></div>'+kws("相關性 high 判斷詞","","relevance_high","evt");}
function exs(t,d,k){var w=C[k]||[];
  var tags=w.map(function(x){return '<span class="kt exc">'+esc(x)+'<span class="kr" data-rk="'+k+'" data-rw="'+esc(x)+'">x</span></span>';}).join('');
  return '<div class="sec"><div class="sh"><div class="st">'+t+'</div><div class="sd">'+d+'</div></div><div class="sb"><div class="ke"><div class="kl">'+(tags||'<span style="color:var(--mu);font-size:11px">(空)</span>')+'</div>'+
  '<div class="ka"><input type="text" data-ak="'+k+'" placeholder="新增排除詞"><button data-ab="'+k+'">+</button></div></div></div></div>';}
function rFl(){var wl=C.filter_whitelist||[];
