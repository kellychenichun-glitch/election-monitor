<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選情雷達｜彰化選情監控</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f9fa;--sf:#fff;--sf2:#f1f3f5;--bd:#dee2e6;--tx:#212529;--mu:#6c757d;--ac:#16a34a;--al:#dcfce7;--da:#dc2626;--dl:#fee2e2;--ne:#64748b;--go:#d97706;--gl:#fef3c7;--bl:#2563eb;--bll:#dbeafe;--hu:#059669;--hl:#d1fae5;--ch:#7c3aed;--cl:#ede9fe}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:16px}
.wrap{max-width:1400px;margin:0 auto;padding:0 28px}
.hdr{background:var(--sf);border-bottom:1.5px solid var(--bd);padding:28px 0 20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:16px}
.icon{width:52px;height:52px;background:linear-gradient(135deg,var(--ac),#15803d);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}
h1{font-size:28px;font-weight:900;color:var(--tx)}h1 span{color:var(--ac)}
.sub{font-size:14px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px}
.hrow{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}
.hr2{text-align:right}
.lup{font-size:13px;color:var(--mu);font-family:'DM Mono',monospace}
.lb{display:inline-flex;align-items:center;gap:6px;background:var(--al);border:1px solid #86efac;border-radius:20px;padding:5px 14px;font-size:13px;color:var(--ac);font-weight:600;margin-bottom:5px}
.ld{width:7px;height:7px;background:var(--ac);border-radius:50%;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.main{padding:24px 0}
.dn{display:flex;align-items:center;gap:10px;margin-bottom:24px;overflow-x:auto}
.db{flex-shrink:0;padding:8px 18px;border-radius:20px;border:1.5px solid var(--bd);background:var(--sf);color:var(--mu);font-size:14px;cursor:pointer;font-weight:500;font-family:'DM Mono',monospace}
.db:hover{border-color:var(--ac);color:var(--ac)}.db.active{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
.sc{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ca,var(--ac))}
.sl{font-size:12px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.sv{font-size:36px;font-weight:900;line-height:1}.ss{font-size:13px;color:var(--mu);margin-top:5px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
@media(max-width:768px){.cg{grid-template-columns:1fr}}
.cc{background:var(--sf);border:1.5px solid var(--bd);border-radius:16px;padding:22px;position:relative;overflow:hidden}
.cc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--cc)}
.cc.huang{--cc:var(--hu)}.cc.chen{--cc:var(--ch)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cn{font-size:20px;font-weight:900}.cn span{color:var(--cc)}
.clo{font-size:12px;color:var(--mu);background:var(--sf2);border-radius:6px;padding:4px 10px;font-family:'DM Mono',monospace}
.cbar{display:flex;gap:4px;margin-bottom:18px;border-radius:6px;overflow:hidden;height:10px}
.bpos{background:var(--ac);transition:width .8s}.bneu{background:#cbd5e1;transition:width .8s}.bneg{background:var(--da);transition:width .8s}
.cst{display:flex;gap:14px}.ci{text-align:center;flex:1}
.cnum{font-size:22px;font-weight:900}.clb{font-size:11px;color:var(--mu);text-transform:uppercase;font-weight:600}
.fl{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.fb{padding:7px 16px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);color:var(--mu);font-size:13px;cursor:pointer;font-weight:500;font-family:'Noto Sans TC',sans-serif}
.fb:hover{border-color:var(--ac);color:var(--ac)}.fb.active{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:700}
.tw{background:var(--sf);border:1.5px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:32px}
.th{padding:18px 22px;border-bottom:1.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--sf2)}
.tt{font-size:15px;font-weight:800}.tc{font-size:13px;color:var(--mu);font-family:'DM Mono',monospace}
table{width:100%;border-collapse:collapse}
thead th{padding:12px 18px;text-align:left;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;background:var(--sf2);font-weight:700;white-space:nowrap;border-bottom:1.5px solid var(--bd)}
td{padding:14px 18px;font-size:14px;border-top:1px solid var(--bd);vertical-align:middle}
tr:hover td{background:#f8f9fa}
.badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;white-space:nowrap}
.bp2{background:var(--al);color:var(--ac);border:1px solid #86efac}
.bn2{background:var(--dl);color:var(--da);border:1px solid #fca5a5}
.bnu2{background:#f1f5f9;color:var(--ne);border:1px solid #cbd5e1}
.bhi{background:var(--gl);color:var(--go);border:1px solid #fcd34d}
.bmd{background:var(--bll);color:var(--bl);border:1px solid #93c5fd}
.blo2{background:#f1f5f9;color:var(--mu);border:1px solid var(--bd)}
.bhu{background:var(--hl);color:var(--hu);border:1px solid #6ee7b7}
.bch{background:var(--cl);color:var(--ch);border:1px solid #c4b5fd}
.tce{max-width:300px}
.ttx{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;font-size:14px}
.smy{font-size:12px;color:var(--mu);margin-top:4px}
a.lnk{color:var(--bl);text-decoration:none;font-size:13px;font-weight:600}
a.lnk:hover{color:var(--ac);text-decoration:underline}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:16px;color:var(--mu)}
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--mu);font-size:15px}
.tsx{overflow-x:auto}
.ft{padding:28px 0;border-top:1.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mu);flex-wrap:wrap;gap:8px}
.sbw{height:5px;background:var(--sf2);border-radius:3px;overflow:hidden;margin-top:8px}
.sb{height:100%;border-radius:3px;transition:width .8s}
.fi{animation:fi .3s ease both}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style></head>
<body>
<div class="hdr"><div class="wrap"><div class="hrow">
<div class="logo"><div class="icon">📡</div>
<div><h1>選情<span>雷達</span></h1><div class="sub">彰化縣市選情即時監控系統 &middot; v5.3</div></div></div>
<div class="hr2"><div class="lb"><div class="ld"></div> LIVE DATA</div><div class="lup" id="lup">載入中...</div></div>
</div></div></div>
<div class="wrap main">
<div class="dn" id="dn"></div>
<div class="sg" id="sg"><div class="loading"><div class="spinner"></div></div></div>
<div class="cg" id="cg"></div>
<div class="fl">
<button class="fb active" data-f="all">全部</button>
<button class="fb" data-f="黃柏瑜">黃柏瑜</button>
<button class="fb" data-f="陳素月">陳素月</button>
<button class="fb" data-f="正面">🟢 正面</button>
<button class="fb" data-f="負面">🔴 負面</button>
<button class="fb" data-f="high">🔥 重要</button>
<button class="fb" data-f="Google News">Google News</button>
<button class="fb" data-f="FB">Facebook</button>
<button class="fb" data-f="IG">Instagram</button>
<button class="fb" data-f="Threads">Threads</button>
<button class="fb" data-f="PTT">PTT</button>
</div>
<div class="tw">
<div class="th"><div class="tt">📋 今日報告</div><div class="tc" id="tc"></div></div>
<div class="tsx"><table>
<thead><tr><th>時間</th><th>候選人</th><th>平台</th><th>議題</th><th>標題/摘要</th><th>情緒</th><th>重要度</th><th>連結</th></tr></thead>
<tbody id="tb"><tr><td colspan="8"><div class="loading"><div class="spinner"></div><span>載入資料中...</span></div></td></tr></tbody>
</table></div></div></div>
<div class="wrap"><div class="ft">
<div>選情雷達 &middot; 資料來源：Serper.dev + Google News RSS</div>
<div>資料每日 08:00 / 14:00 / 20:00（台灣時間）自動更新</div>
</div></div>
<script>
var SID='1rKfbDPgmjenPuXh3d7BuOffrQzZyrze54Q_uFpBnw_k';
var ICO={'Google':'🔍','Google News':'📰','FB':'📘','IG':'📸','Threads':'🧵','PTT':'💬'};
var D=[],AF='all',SH=[],AS='';
function dlist(){var t=new Date(),r=[];for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()-i);r.push(d.toISOString().split('T')[0]);}return r;}
function chkErr(txt){return txt.indexOf('tatus":"erro')>-1;}
async function getSheets(){
  var ds=dlist(),res=[];
  for(var i=0;i<ds.length;i++){
    try{
      var r=await fetch('https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?tqx=out:json&sheet='+ds[i]);
      var t=await r.text();
      if(chkErr(t))continue;
      var s=t.indexOf('{'),e=t.lastIndexOf('}');
      if(s<0||e<0)continue;
      var j=JSON.parse(t.substring(s,e+1));
      if(j.table&&j.table.rows&&j.table.rows.length>1)res.push(ds[i]);
    }catch(x){}
  }
  return res;
}
async function fetchData(sh){
  var r=await fetch('https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?tqx=out:json&sheet='+sh+'&ts='+Date.now());
  var t=await r.text();
  var s=t.indexOf('{'),e=t.lastIndexOf('}');
  var j=JSON.parse(t.substring(s,e+1));
  var data=[];
  for(var i=0;i<j.table.rows.length;i++){
    var rw=j.table.rows[i];
    var c=rw.c.map(function(x){return x?(x.v||''):'';});
    if(c[0]==='時間'||c[0]==='測試'||!c[1])continue;
    data.push({time:String(c[0]||''),candidate:String(c[1]||''),topic:String(c[2]||''),stance:String(c[3]||''),sentiment:String(c[4]||''),priority:String(c[5]||''),summary:String(c[6]||''),source:String(c[7]||''),title:String(c[8]||''),url:String(c[9]||''),date:String(c[10]||sh)});
  }
  return data;
}
function nav(){
  var h='';
  for(var i=0;i<SH.length;i++){var d=SH[i];h+='<button class="db'+(d===AS?' active':'')+'" onclick="sw(''+d+'')">'+d+'</button>';}
  document.getElementById('dn').innerHTML=h;
}
async function sw(d){AS=d;nav();document.getElementById('tb').innerHTML='<tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>';D=await fetchData(d);renderAll();}
function rStats(data){
  var pos=0,neg=0,hi=0,pl=[];
  for(var i=0;i<data.length;i++){
    if(data[i].sentiment==='正面')pos++;
    if(data[i].sentiment==='負面')neg++;
    if(data[i].priority==='high')hi++;
    if(pl.indexOf(data[i].source)<0)pl.push(data[i].source);
  }
  var n=data.length,sc=n?Math.round((pos-neg)/n*100):0;
  var col=sc>=0?'var(--ac)':'var(--da)',ss=(sc>0?'+':'')+sc;
  document.getElementById('sg').innerHTML=
    '<div class="sc" style="--ca:var(--bl)"><div class="sl">今日聲量</div><div class="sv" style="color:var(--bl)">'+n+'</div><div class="ss">'+pl.length+' 個平台</div></div>'+
    '<div class="sc" style="--ca:var(--ac)"><div class="sl">正面報導</div><div class="sv" style="color:var(--ac)">'+pos+'</div><div class="ss">'+(n?Math.round(pos/n*100):0)+'%</div></div>'+
    '<div class="sc" style="--ca:var(--da)"><div class="sl">負面報導</div><div class="sv" style="color:var(--da)">'+neg+'</div><div class="ss">'+(n?Math.round(neg/n*100):0)+'%</div></div>'+
    '<div class="sc" style="--ca:var(--go)"><div class="sl">重要事件</div><div class="sv" style="color:var(--go)">'+hi+'</div><div class="ss">high priority</div></div>'+
    '<div class="sc" style="--ca:'+col+'"><div class="sl">情緒指數</div><div class="sv" style="color:'+col+'">'+ss+'</div><div class="sbw"><div class="sb" style="width:'+Math.min(100,Math.abs(sc))+'%;background:'+col+'"></div></div></div>';
}
function rCands(data){
  var ca=[{k:'黃柏瑜',c:'huang',l:'彰化市'},{k:'陳素月',c:'chen',l:'彰化縣'}];
  var h='';
  for(var i=0;i<ca.length;i++){
    var c=ca[i];
    var rows=data.filter(function(r){return r.candidate===c.k;});
    var pos=rows.filter(function(r){return r.sentiment==='正面';}).length;
    var neg=rows.filter(function(r){return r.sentiment==='負面';}).length;
    var neu=rows.filter(function(r){return r.sentiment==='中立';}).length;
    var n=rows.length,sc=n?Math.round((pos-neg)/n*100):0;
    var pw=n?Math.round(pos/n*100):33,nuw=n?Math.round(neu/n*100):34,ngw=n?100-pw-nuw:33;
    var col=sc>=0?'var(--ac)':'var(--da)';
    h+='<div class="cc '+c.c+'"><div class="ch"><div class="cn"><span>'+c.k+'</span></div><div class="clo">'+c.l+'</div></div>'+
       '<div class="cbar"><div class="bpos" style="width:'+pw+'%"></div><div class="bneu" style="width:'+nuw+'%"></div><div class="bneg" style="width:'+ngw+'%"></div></div>'+
       '<div class="cst">'+
       '<div class="ci"><div class="cnum" style="color:var(--ac)">'+pos+'</div><div class="clb">正面</div></div>'+
       '<div class="ci"><div class="cnum" style="color:var(--ne)">'+neu+'</div><div class="clb">中立</div></div>'+
       '<div class="ci"><div class="cnum" style="color:var(--da)">'+neg+'</div><div class="clb">負面</div></div>'+
       '<div class="ci"><div class="cnum" style="color:'+col+'">'+(sc>0?'+':'')+sc+'</div><div class="clb">指數</div></div>'+
       '</div></div>';
  }
  document.getElementById('cg').innerHTML=h;
}
function rTable(data){
  document.getElementById('tc').textContent=data.length+' 筆';
  if(!data.length){document.getElementById('tb').innerHTML='<tr><td colspan="8"><div class="empty">目前沒有資料</div></td></tr>';return;}
  var h='';
  for(var i=0;i<data.length;i++){
    var r=data[i];
    var sb=r.sentiment==='正面'?'bp2':r.sentiment==='負面'?'bn2':'bnu2';
    var se=r.sentiment==='正面'?'🟢':r.sentiment==='負面'?'🔴':'⚪';
    var pb=r.priority==='high'?'bhi':r.priority==='medium'?'bmd':'blo2';
    var pt=r.priority==='high'?'🔥 重要':r.priority==='medium'?'中':'低';
    var cc=r.candidate==='黃柏瑜'?'bhu':'bch';
    var pi=ICO[r.source]||'🌐';
    var ts=r.time.length>5?r.time.substring(0,5):r.time;
    h+='<tr class="fi" style="animation-delay:'+(i*0.02)+'s">'+
       '<td><span style="font-family:DM Mono,monospace;font-size:13px;color:var(--mu)">'+ts+'</span></td>'+
       '<td><span class="badge '+cc+'">'+r.candidate+'</span></td>'+
       '<td><span style="font-size:14px;color:var(--mu)">'+pi+' '+r.source+'</span></td>'+
       '<td><span style="font-size:13px">'+r.topic+'</span></td>'+
       '<td class="tce"><div class="ttx">'+r.title+'</div>'+(r.summary?'<div class="smy">'+r.summary+'</div>':'')+'</td>'+
       '<td><span class="badge '+sb+'">'+se+' '+r.sentiment+'</span></td>'+
       '<td><span class="badge '+pb+'">'+pt+'</span></td>'+
       '<td>'+(r.url?'<a class="lnk" href="'+r.url+'" target="_blank">查看 →</a>':'-')+'</td>'+
       '</tr>';
  }
  document.getElementById('tb').innerHTML=h;
}
function applyF(f){
  AF=f;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.toggle('active',b.dataset.f===f);});
  var fd=D;
  if(f!=='all')fd=D.filter(function(r){return r.candidate===f||r.sentiment===f||r.priority===f||r.source===f;});
  rTable(fd);
}
document.querySelectorAll('.fb').forEach(function(b){b.addEventListener('click',function(){applyF(b.dataset.f);});});
function renderAll(){rStats(D);rCands(D);applyF(AF);var now=new Date();document.getElementById('lup').textContent='最後更新：'+now.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
async function init(){
  document.getElementById('lup').textContent='掃描資料中...';
  try{
    SH=await getSheets();
    if(!SH.length){
      document.getElementById('sg').innerHTML='<div class="empty" style="grid-column:1/-1">目前沒有可用資料</div>';
      document.getElementById('tb').innerHTML='<tr><td colspan="8"><div class="empty">暫無資料</div></td></tr>';
      document.getElementById('lup').textContent='尚無資料';
      return;
    }
    AS=SH[0];nav();
    D=await fetchData(AS);renderAll();
    setInterval(async function(){D=await fetchData(AS);renderAll();},5*60*1000);
  }catch(ex){document.getElementById('lup').textContent='載入失敗：'+ex.message;}
}
init();
</script>
</body></html>
