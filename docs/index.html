<script>

// ============================================================
// 前台登入保護 — 與 admin 共用同一套使用者系統
// ============================================================
(function() {
  var USERS_KEY = 'em_users';
  var FE_SESSION_KEY = 'em_fe_session';
  var DEFAULT_USERS = [
    {username:'admin', pwHash: _feHash('admin123'), role:'admin', created:'', lastLogin:'', loginCount:0}
  ];

  function _feHash(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h = h & h;
    }
    return 'h' + Math.abs(h).toString(16) + str.length.toString(16);
  }

  function getUsers() {
    try { var u = localStorage.getItem(USERS_KEY); if (u) return JSON.parse(u); } catch(e) {}
    return DEFAULT_USERS;
  }

  function checkSession() {
    try {
      var s = localStorage.getItem(FE_SESSION_KEY);
      if (!s) return false;
      var sess = JSON.parse(s);
      // session 有效期 24 小時
      var age = Date.now() - new Date(sess.time).getTime();
      return age < 24 * 60 * 60 * 1000;
    } catch(e) { return false; }
  }

  function tryLogin(username, password) {
    var users = getUsers();
    var user = users.find(function(u){ return u.username === username; });
    if (!user) return false;
    if (user.pwHash !== _feHash(password)) return false;
    // 更新登入時間
    user.lastLogin = new Date().toLocaleString('zh-TW');
    user.loginCount = (user.loginCount || 0) + 1;
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
    // 設定 session
    localStorage.setItem(FE_SESSION_KEY, JSON.stringify({
      username: username,
      time: new Date().toISOString()
    }));
    return true;
  }

  function showApp() {
    var el = document.getElementById('fe-login');
    if (el) el.style.display = 'none';
  }

  // 已登入 → 直接顯示
  if (checkSession()) {
    // 等 DOM 就緒
    document.addEventListener('DOMContentLoaded', function() { showApp(); });
    return;
  }

  // 未登入 → 等 DOM 就緒後顯示登入畫面
  document.addEventListener('DOMContentLoaded', function() {
    var loginEl = document.getElementById('fe-login');
    if (!loginEl) return;

    function doLogin() {
      var u = document.getElementById('fe-user').value.trim();
      var p = document.getElementById('fe-pass').value;
      var err = document.getElementById('fe-err');
      if (!u || !p) { err.textContent = '\u8ACB\u8F38\u5165\u5E33\u865F\u548C\u5BC6\u78BC'; return; }
      if (tryLogin(u, p)) {
        showApp();
      } else {
        err.textContent = '\u5E33\u865F\u6216\u5BC6\u78BC\u932F\u8AA4';
        document.getElementById('fe-pass').value = '';
      }
    }

    document.getElementById('fe-btn').addEventListener('click', doLogin);
    document.getElementById('fe-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    document.getElementById('fe-user').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('fe-pass').focus(); });
  });
})();

    filter_csy_exclude: ["\u767d\u7c73","\u5305\u6750","\u8fb2\u7522\u5305\u6750","\u8fb2\u6703","\u7a3b\u7c73","\u81ea\u5099\u888b","\u54e1\u6797\u5e02","\u54e1\u6797\u8fb2\u6703","\u5927\u5ce6\u5deb\u6b65\u9053","\u5317\u6e9d\u6392\u6c34","\u516b\u5366\u5c71","\u6b65\u9053","\u74b0\u4fdd\u8003\u5bdf","\u5a92\u7956","\u5b97\u6559\u6d3b\u52d5","\u6a02\u9f4a","\u9577\u7167"],
    filter_hby_exclude: [],
    filter_whitelist: ["SayYes","\u9673\u7d20\u6708\u59d4\u54e1","Chen Su-Yueh"],
    filter_ig_threads_strict: true,
    filter_relevance_must_name: true,
    display: {show_score:true, show_rel:false, sort:"level", per_page:100, refresh:5, show_low:false},
    filter_buttons: null
  };
  try {

function getRelevanceLevel(r) {
  var ttl = (r.title || "").toLowerCase();

  var sum = (r.summary || "").toLowerCase();
  var cand = r.candidate || "";
  var candShort = cand.substring(0,2);
  var mustHaveName = CFG.filter_relevance_must_name !== false;
  // 必須有候選人名字才能是 high
  var hasCandName = ttl.indexOf(candShort) > -1 || sum.indexOf(candShort) > -1
    || ttl.indexOf("\u7d20\u6708") > -1 || ttl.indexOf("\u67cf\u745c") > -1;
  if (mustHaveName && !hasCandName) {
    // 沒有名字 → medium（若有彰化縣長相關詞）或 low
    var midChk = ["\u5f70\u5316\u7e23\u9577","\u5f70\u5316\u5e02\u9577","2026\u5f70\u5316"];
    for (var mi = 0; mi < midChk.length; mi++) {
      if (ttl.indexOf(midChk[mi]) > -1) return "medium";
    }
    return "low";
  }
  // 有名字 → 看高相關詞
  var highWords = CFG.relevance_high || [];
  for (var i = 0; i < highWords.length; i++) {
    if (ttl.indexOf(highWords[i]) > -1 || t.indexOf(highWords[i]) > -1) return "high";
  }
  if (ttl.indexOf(candShort) < 5) return "high";
  return "medium";
}

  // 用 CFG 關鍵字判斷
  var harmful = CFG.signal_harmful || [];
  for (var i = 0; i < harmful.length; i++) {
    if (txt.indexOf(harmful[i]) > -1) return "har";
  }
  var unclear = CFG.signal_unclear || [];
  for (var i = 0; i < unclear.length; i++) {
    if (txt.indexOf(unclear[i]) > -1) return "unc";
  }
  var beneficial = CFG.signal_beneficial || [];
  for (var i = 0; i < beneficial.length; i++) {
    if (txt.indexOf(beneficial[i]) > -1) return "ben";
  }
  // 用 stance/sentiment fallback
  var st = (r.stance || r.sentiment || "").toLowerCase();

function getImportanceScore(r) {
  // 多因子評分
  var score = 0;
  
  // 1. 主體性 (priority 作為代理)
  if (r.priority === "high") score += 3;
  else if (r.priority === "medium") score += 1;
  
  // 2. 事件類型
  var et = r._eventType || getEventType(r);
  if (et === "controversy") score += 3;
  else if (et === "mobilization" || et === "election") score += 2;
  else if (et === "local_construction" || et === "policy") score += 2;
  else score += 1;
  
  // 3. 擴散性 (platform 作為代理)
  if (r.source === "Google News") score += 2;
  else if (r.source === "Google") score += 2;
  else score += 1;
  
  // 4. 來源可信度
  if (r.source === "Google News" || r.source === "Google") score += 3;
  else if (r.source === "FB" || r.source === "IG") score += 2;
  else score += 1;
  
  // 5. 選情影響
  var sig = r._signal || getSignalDirection(r);
  if (sig === "har") score += 3; // 不利訊號更需要立即處理
  else if (sig === "ben") score += 2;
  else score += 1;
  
  return score;
}

function getImportanceLevel(score) {
  var t = CFG.thresholds;
  if (score >= t.S) return "S";
  if (score >= t.A) return "A";
  if (score >= t.B) return "B";
  return "C";
}
function calcImportanceScore(r) {
  var s = CFG.scoring;
  var score = 0;
  // 主體性
  var ttl = (r.title || "").toLowerCase();
  var cand = (r.candidate || "").substring(0,2);
  if (ttl.indexOf(cand) > -1 || ttl.indexOf("\u7d20\u6708") > -1 || ttl.indexOf("\u67cf\u745c") > -1) {
    score += s.subject_main;
  } else {
    score += s.subject_mention;
  }
  // 事件類型
  var et = r._eventType || getEventType(r);
  var etMap = {
    controversy: s.evt_controversy,
    election: s.evt_election,
    local_construction: s.evt_construction,
    mobilization: s.evt_mobilization,
    policy: s.evt_policy,
    service: s.evt_service,
    media: s.evt_media,
    general: s.evt_general
  };
  score += etMap[et] || s.evt_general;
  // 擴散性（目前單一來源）
  score += s.spread_single_low;
  // 來源可信度
  var src = (r.source || "").toLowerCase();
  if (src === "google" || src.indexOf("news") > -1) score += s.cred_media;
  else if (src === "fb" || src === "ig" || src === "threads") score += s.cred_social;
  else score += s.cred_unknown;
  // 選情影響力
  var sig = r._signal || getSignalDirection(r);
  if (sig === "har") score += s.impact_critical;
  else if (sig === "ben") score += s.impact_notable;
  else score += s.impact_record;
  // 時效性（今日資料）
  score += s.recency_active;
  return score;
}

}

function makeUrl(sheet) {
  return "https://docs.google.com/spreadsheets/d/" + SID + "/gviz/tq?tqx=out:json&sheet=" + sheet + "&ts=" + Date.now();
}

function dlist() {
  var t = new Date(), r = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(t);
    d.setDate(t.getDate() - i);
    r.push(d.toISOString().split("T")[0]);
  }
  return r;
}

async function getSheets() {
  var ds = dlist(), res = [];
  for (var i = 0; i < ds.length; i++) {
    try {
      var url = "https://docs.google.com/spreadsheets/d/" + SID + "/gviz/tq?tqx=out:json&sheet=" + ds[i];
      var r = await fetch(url);
      var t = await r.text();
      var ec = "status" + String.fromCharCode(34) + ":" + String.fromCharCode(34) + "error";
      if (t.indexOf(ec) > -1) continue;
      var s = t.indexOf("{"), e = t.lastIndexOf("}");
      if (s < 0 || e < 0) continue;
      var j = JSON.parse(t.substring(s, e + 1));
      if (j.table && j.table.rows && j.table.rows.length > 1) res.push(ds[i]);
    } catch (x) {}
  }
  return res;
}

async function fetchData(sheet) {
  var r = await fetch(makeUrl(sheet));
  var t = await r.text();
  var s = t.indexOf("{"), e = t.lastIndexOf("}");
  var j = JSON.parse(t.substring(s, e + 1));
  var data = [];
  for (var i = 0; i < j.table.rows.length; i++) {
    var rw = j.table.rows[i];
    var c = rw.c.map(function(x) { return x ? (x.v || "") : ""; });
    var tv = String(c[0] || ""), cv = String(c[1] || "");
    if (tv === "時間" || tv === "測試" || !cv) continue;
    data.push({time:tv,candidate:cv,topic:String(c[2]||""),stance:String(c[3]||""),sentiment:String(c[4]||""),priority:String(c[5]||""),summary:String(c[6]||""),source:String(c[7]||""),title:String(c[8]||""),url:String(c[9]||""),date:String(c[10]||sheet)});
  }
  return enrichData(data);
}

    html += "<div class=" + String.fromCharCode(34) + "cst" + String.fromCharCode(34) + ">";
    html += "<div class=" + String.fromCharCode(34) + "ci" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cnum" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--ac)" + String.fromCharCode(34) + ">" + ben + "</div><div class=" + String.fromCharCode(34) + "clb" + String.fromCharCode(34) + ">有利</div></div>";
    html += "<div class=" + String.fromCharCode(34) + "ci" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cnum" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--ne)" + String.fromCharCode(34) + ">" + neu + "</div><div class=" + String.fromCharCode(34) + "clb" + String.fromCharCode(34) + ">中性</div></div>";
    html += "<div class=" + String.fromCharCode(34) + "ci" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cnum" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--da)" + String.fromCharCode(34) + ">" + har + "</div><div class=" + String.fromCharCode(34) + "clb" + String.fromCharCode(34) + ">不利</div></div>";
    html += "<div class=" + String.fromCharCode(34) + "ci" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cnum" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--go)" + String.fromCharCode(34) + ">" + rows.filter(function(r){return r._level==="S"||r._level==="A";}).length + "</div><div class=" + String.fromCharCode(34) + "clb" + String.fromCharCode(34) + ">S+A</div></div>";
    html += "</div></div>";
  }
  document.getElementById("cg").innerHTML = html;
}

var SIG_LABEL = {"ben":"✅ 有利","har":"❌ 不利","neu":"⚪ 中性","unc":"⚠ 待判讀"};
var SIG_CLASS = {"ben":"sig-ben","har":"sig-har","neu":"sig-neu","unc":"sig-unc"};
var LEV_CLASS = {"S":"lev-s","A":"lev-a","B":"lev-b","C":"lev-c"};

function renderTable(data) {
  document.getElementById("tc").textContent = data.length + " 筆";
  if (!data.length) {
    document.getElementById("tb").innerHTML = "<tr><td colspan=" + String.fromCharCode(34) + "8" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "empty" + String.fromCharCode(34) + ">目前沒有符合條件的資料</div></td></tr>";
    return;
  }
  var html = "";
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    var cc = r.candidate === "黃柏瑜" ? "bhu" : "bch";
    var sigCls = SIG_CLASS[r._signal] || "sig-neu";
    var sigLbl = SIG_LABEL[r._signal] || "⚪";
    var levCls = LEV_CLASS[r._level] || "lev-c";
    var etLbl = EVENT_TYPE_LABEL[r._eventType] || "一般";
    var ts = r.time.length > 5 ? r.time.substring(0, 5) : r.time;
    html += "<tr>";
    html += "<td><span style=" + String.fromCharCode(34) + "font-family:'DM Mono',monospace;font-size:12px;color:var(--mu)" + String.fromCharCode(34) + ">" + ts + "</span></td>";
    html += "<td><span class=" + String.fromCharCode(34) + "badge " + cc + String.fromCharCode(34) + ">" + r.candidate + "</span></td>";
    html += "<td><span style=" + String.fromCharCode(34) + "font-size:12px;color:var(--mu)" + String.fromCharCode(34) + ">" + r.source + "</span></td>";
    html += "<td><span class=" + String.fromCharCode(34) + "badge evt" + String.fromCharCode(34) + ">" + etLbl + "</span></td>";
    html += "<td class=" + String.fromCharCode(34) + "tce" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "ttx" + String.fromCharCode(34) + ">" + r.title + "</div>" + (r.summary ? "<div class=" + String.fromCharCode(34) + "smy" + String.fromCharCode(34) + ">" + r.summary + "</div>" : "") + "</td>";
    html += "<td><span class=" + String.fromCharCode(34) + "badge " + sigCls + String.fromCharCode(34) + ">" + sigLbl + "</span></td>";
    html += "<td><span class=" + String.fromCharCode(34) + "badge " + levCls + String.fromCharCode(34) + ">" + r._level + "</span><span class=" + String.fromCharCode(34) + "score-tag" + String.fromCharCode(34) + ">" + r._score + "pt</span></td>";
    html += "<td>" + (r.url ? "<a class=" + String.fromCharCode(34) + "lnk" + String.fromCharCode(34) + " href=" + String.fromCharCode(34) + r.url + String.fromCharCode(34) + " target=" + String.fromCharCode(34) + "_blank" + String.fromCharCode(34) + ">查看</a>" : "-") + "</td>";
    html += "</tr>";
  }
  document.getElementById("tb").innerHTML = html;
}

// === filter ===

function applyFilters() {
  var f = FILTERS;
  var fd = D.filter(function(r) {
    if (f.cand !== "all" && r.candidate !== (CANDMAP[f.cand] || f.cand)) return false;
    if (f.sig !== "all" && r._signal !== f.sig) return false;
    if (f.lev !== "all" && r._level !== f.lev) return false;
    if (f.src !== "all") {
      var tgt = SRCMAP[f.src] || f.src;
      if (r.source !== tgt) return false;
    }
    return true;
  });
  FD = fd;
  renderStats(D); // stats 还是用全部資料
  renderCands(D);
  renderTable(fd);
  document.getElementById("tc").textContent = fd.length + " 筆";
}

document.querySelectorAll(".fb").forEach(function(b) {
  b.addEventListener("click", function() {
    var g = b.dataset.g, f2 = b.dataset.f;
    FILTERS[g] = f2;
    document.querySelectorAll(".fb[data-g=" + String.fromCharCode(34) + g + String.fromCharCode(34) + "]").forEach(function(x) {
      x.classList.toggle("active", x.dataset.f === f2);
    });
    applyFilters();
  });
});

function renderAll() {
  applyFilters();
  var now = new Date();
  document.getElementById("lup").textContent = "最後更新：" + now.toLocaleString("zh-TW", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

async function init() {
  document.getElementById("lup").textContent = "掃描資料中...";
  try {
    SH = await getSheets();
    if (!SH.length) {
      document.getElementById("sg").innerHTML = "<div class=" + String.fromCharCode(34) + "empty" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "grid-column:1/-1" + String.fromCharCode(34) + ">目前沒有可用資料</div>";
      document.getElementById("tb").innerHTML = "<tr><td colspan=" + String.fromCharCode(34) + "8" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "empty" + String.fromCharCode(34) + ">暫無資料</div></td></tr>";
      document.getElementById("lup").textContent = "尚無資料";
      return;
    }
    AS = SH[0]; renderNav();
    D = await fetchData(AS);
    renderAll();
    setInterval(async function() { D = await fetchData(AS); renderAll(); }, 300000);
  } catch (ex) {
    document.getElementById("lup").textContent = "載入失敗：" + ex.message;
  }
}

init();
</script>
