<style>
:root{--bg:#f8f9fa;--sf:#fff;--sf2:#f1f3f5;--bd:#dee2e6;--tx:#212529;--mu:#6c757d;--ac:#16a34a;--al:#dcfce7;--da:#dc2626;--dl:#fee2e2;--ne:#64748b;--go:#d97706;--gl:#fef3c7;--bl:#2563eb;--bll:#dbeafe;--hu:#059669;--hl:#d1fae5;--ch:#7c3aed;--cl:#ede9fe;--ye:#ca8a04;--yl:#fef9c3}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:16px}
.wrap{max-width:1440px;margin:0 auto;padding:0 28px}

h1{font-size:26px;font-weight:900;color:var(--tx)}h1 span{color:var(--ac)}

.lb{display:inline-flex;align-items:center;gap:6px;background:var(--al);border:1px solid #86efac;border-radius:20px;padding:4px 12px;font-size:12px;color:var(--ac);font-weight:600;margin-bottom:4px}

.db{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1.5px solid var(--bd);background:var(--sf);color:var(--mu);font-size:13px;cursor:pointer;font-weight:500;font-family:'DM Mono',monospace}

.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}

a.lnk{color:var(--bl);text-decoration:none;font-size:12px;font-weight:600}
a.lnk:hover{color:var(--ac);text-decoration:underline}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;color:var(--mu)}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px;color:var(--mu);font-size:14px}
.tsx{overflow-x:auto}
.ft{padding:24px 0;border-top:1.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--mu);flex-wrap:wrap;gap:8px}

.sb{height:100%;border-radius:2px;transition:width .8s}
.score-tag{font-size:10px;font-family:'DM Mono',monospace;color:var(--mu);margin-left:4px}

<script>
var SID = "1rKfbDPgmjenPuXh3d7BuOffrQzZyrze54Q_uFpBnw_k";
var D = [], FD = [], SH = [], AS = "";
var FILTERS = {cand:"all", sig:"all", lev:"all", src:"all"};
var SRCMAP = {"GN":"Google News","FB2":"FB","IG2":"IG","TH":"Threads","PT":"PTT","GO":"Google"};
var CANDMAP = {"HBY":"黃柏瑜","CSY":"陳素月"};

// === 第二優先：判讀逻輯 ===

function getRelevanceLevel(r) {
  // high: 候選人是主角，有明確政治/選情判讀價值
  // medium: 有關聯但非主體
  // low: 只是路過提及
  var t = (r.topic || "").toLowerCase();
  var ttl = (r.title || "").toLowerCase();
  var sum = (r.summary || "").toLowerCase();
  var cand = r.candidate || "";
  
  // high 判斷：候選人明確是主角
  var highWords = ["選舉","提名","候選","立委","質詢","交通委員會","建設","政見","守護區","彰化市長","彰化縣長","大選","選民","議員","官幺","造勴","講座"];
  for (var i = 0; i < highWords.length; i++) {
    if (ttl.indexOf(highWords[i]) > -1 || t.indexOf(highWords[i]) > -1) return "high";
  }
  
  // 若候選人名字在標題最前面，也算 high
  var candShort = cand.substring(0,2);
  if (ttl.indexOf(candShort) === 0 || ttl.indexOf(candShort) < 5) return "high";
  
  // medium: 有提到候選人相關脈絡
  var medWords = ["彰化","彰化市","彰化縣","地方","居民","民發","民進黨","國民黨"];
  for (var i = 0; i < medWords.length; i++) {
    if (ttl.indexOf(medWords[i]) > -1 || sum.indexOf(medWords[i]) > -1) return "medium";
  }
  
  return "low";
}

function getSignalDirection(r) {
  // 根據 sentiment + topic + priority 判斷訊號傾向
  var s = r.sentiment || "";
  var t = (r.topic || "").toLowerCase();
  var ttl = (r.title || "").toLowerCase();
  var sum = (r.summary || "").toLowerCase();
  
  // harmful: 負面情緒 或 爭議/批評/攻擊 關鍵字
  if (s === "負面") return "har";
  var harmWords = ["爭議","批評","攻擊","指控","賣","失言","危機","負面","問題","送辦","起訴","提告"];
  for (var i = 0; i < harmWords.length; i++) {
    if (t.indexOf(harmWords[i]) > -1 || ttl.indexOf(harmWords[i]) > -1) return "har";
  }
  
  // beneficial: 正面情緒 或 具體政绩/支持/建設
  if (s === "正面") return "ben";
  var benWords = ["完工","商議","争取","高票","支持","背書","圈粉","提名","合格","當選","力挺","推薦","背書"];
  for (var i = 0; i < benWords.length; i++) {
    if (t.indexOf(benWords[i]) > -1 || ttl.indexOf(benWords[i]) > -1 || sum.indexOf(benWords[i]) > -1) return "ben";
  }
  
  // unclear: 读不出傾向的
  if (t.indexOf("请问") > -1 || ttl.indexOf("迯") > -1 || ttl.indexOf("呼籲") > -1) return "unc";
  
  return "neu";
}

function getEventType(r) {
  var t = (r.topic || "").toLowerCase();
  var ttl = (r.title || "").toLowerCase();
  
  if (t.indexOf("爭議") > -1 || t.indexOf("攻擊") > -1 || ttl.indexOf("攻擊") > -1 || ttl.indexOf("爭議") > -1) return "controversy";
  if (t.indexOf("宣傳") > -1 || t.indexOf("造勴") > -1 || t.indexOf("動員") > -1) return "mobilization";
  if (t.indexOf("建設") > -1 || t.indexOf("工程") > -1 || t.indexOf("步道") > -1 || t.indexOf("道路") > -1 || t.indexOf("公園") > -1) return "local_construction";
  if (t.indexOf("候選人") > -1 || t.indexOf("選舉") > -1 || t.indexOf("提名") > -1 || ttl.indexOf("選舉") > -1) return "election";
  if (t.indexOf("交通") > -1 || t.indexOf("道路") > -1) return "local_construction";
  if (t.indexOf("教育") > -1 || t.indexOf("學校") > -1) return "policy";
  if (t.indexOf("服務") > -1 || t.indexOf("行程") > -1 || t.indexOf("考察") > -1 || t.indexOf("拜訪") > -1) return "service";
  if (t.indexOf("媒體") > -1 || t.indexOf("報導") > -1 || ttl.indexOf("專訪") > -1) return "media";
  return "general";
}

var EVENT_TYPE_LABEL = {
  "controversy": "爭議攻防",
  "mobilization": "組織動員",
  "local_construction": "地方建設",
  "election": "選舉提名",
  "policy": "政策議題",
  "service": "服務行程",
  "media": "媒體曝光",
  "general": "一般報導"
};

function getImportanceScore(r) {
  // 多因子評分
  var score = 0;
  
  // 1. 主體性 (priority 作為代理)
  if (r.priority === "high") score += 3;
  else if (r.priority === "medium") score += 1;
  
  // 2. 事件類型
  var et = r._eventType || getEventType(r);
  if (et === "controversy") score += 3;
  else if (et === "mobilization" || et === "election") score += 2;
  else if (et === "local_construction" || et === "policy") score += 2;
  else score += 1;
  
  // 3. 擴散性 (platform 作為代理)
  if (r.source === "Google News") score += 2;
  else if (r.source === "Google") score += 2;
  else score += 1;
  
  // 4. 來源可信度
  if (r.source === "Google News" || r.source === "Google") score += 3;
  else if (r.source === "FB" || r.source === "IG") score += 2;
  else score += 1;
  
  // 5. 選情影響
  var sig = r._signal || getSignalDirection(r);
  if (sig === "har") score += 3; // 不利訊號更需要立即處理
  else if (sig === "ben") score += 2;
  else score += 1;
  
  return score;
}

function getImportanceLevel(score) {
  if (score >= 11) return "S";
  if (score >= 9) return "A";
  if (score >= 6) return "B";
  return "C";
}

function enrichData(data) {
  // === 陳素月硬過濾：排除員林市長業務 ===
  data = data.filter(function(r) {
    if (r.candidate !== "陳素月") return true;
    // 員林市長陳素月的業務（我們監控的是立協陳素月）
    var noWords = [
      "員林市","員林市長","員林農會","農產包材","白米","包材","漲價","稻米","自備袋",
      "八卦山","步道","大峦巫步道","按摩","環保考察","農會","農業展","展參觀",
      "北溝排水","永安區","業林建設","輻磻地","觀光工廠",
      "楽齐老人","長照","局斯中","媒祖","媒祖聯誼會","宗教活動","宗教",
      "流浪單主","meme","迷因","與我無關","广告","投票","樂透"
    ];
    var txt = (r.title + " " + r.topic + " " + r.summary).toLowerCase();
    for (var i = 0; i < noWords.length; i++) {
      if (txt.indexOf(noWords[i]) > -1) return false;
    }
    // 如果沒有明確提到立委相關譞彙，而且來源是 IG/Threads，表示高風險
    var liWeiWords = ["立委","立法院","交通委員會","彰化縣長","彰化縣選","彰化縣4選區","選舉","提名","訊求","彰化市長候選人","彰化選情","彰化縣選舉"];
    if (r.source === "IG" || r.source === "Threads") {
      var hasLiWei = false;
      for (var j = 0; j < liWeiWords.length; j++) {
        if (txt.indexOf(liWeiWords[j]) > -1) { hasLiWei = true; break; }
      }
      if (!hasLiWei) return false;
    }
    return true;
  });
  // low relevance 不進主表（先計算 relevance，再過濾）
  data = data.map(function(r) {
    var copy2 = Object.assign({}, r);
    copy2._relevance = getRelevanceLevel(r);
    return copy2;
  }).filter(function(r) {
    return r._relevance !== "low";
  });
  // === 過濾結束 ===
  // 為每筆資料加上計算屬性
  return data.map(function(r) {
    var copy = Object.assign({}, r);
    copy._signal = getSignalDirection(r);
    copy._relevance = getRelevanceLevel(r);
    copy._eventType = getEventType(r);
    copy._score = getImportanceScore(copy);
    copy._level = getImportanceLevel(copy._score);
    return copy;
  }).sort(function(a, b) {
    // 依重要等級、分數、時間排序
    var lvOrder = {"S":0,"A":1,"B":2,"C":3};
    if (lvOrder[a._level] !== lvOrder[b._level]) return lvOrder[a._level] - lvOrder[b._level];
    if (b._score !== a._score) return b._score - a._score;
    return b.time > a.time ? 1 : -1;
  });
}

// === fetch ===

function makeUrl(sheet) {
  return "https://docs.google.com/spreadsheets/d/" + SID + "/gviz/tq?tqx=out:json&sheet=" + sheet + "&ts=" + Date.now();
}

function dlist() {
  var t = new Date(), r = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(t);
    d.setDate(t.getDate() - i);
    r.push(d.toISOString().split("T")[0]);
  }
  return r;
}

async function getSheets() {
  var ds = dlist(), res = [];
  for (var i = 0; i < ds.length; i++) {
    try {
      var url = "https://docs.google.com/spreadsheets/d/" + SID + "/gviz/tq?tqx=out:json&sheet=" + ds[i];
      var r = await fetch(url);
      var t = await r.text();
      var ec = "status" + String.fromCharCode(34) + ":" + String.fromCharCode(34) + "error";
      if (t.indexOf(ec) > -1) continue;
      var s = t.indexOf("{"), e = t.lastIndexOf("}");
      if (s < 0 || e < 0) continue;
      var j = JSON.parse(t.substring(s, e + 1));
      if (j.table && j.table.rows && j.table.rows.length > 1) res.push(ds[i]);
    } catch (x) {}
  }
  return res;
}

async function fetchData(sheet) {
  var r = await fetch(makeUrl(sheet));
  var t = await r.text();
  var s = t.indexOf("{"), e = t.lastIndexOf("}");
  var j = JSON.parse(t.substring(s, e + 1));
  var data = [];
  for (var i = 0; i < j.table.rows.length; i++) {
    var rw = j.table.rows[i];
    var c = rw.c.map(function(x) { return x ? (x.v || "") : ""; });
    var tv = String(c[0] || ""), cv = String(c[1] || "");
    if (tv === "時間" || tv === "測試" || !cv) continue;
    data.push({time:tv,candidate:cv,topic:String(c[2]||""),stance:String(c[3]||""),sentiment:String(c[4]||""),priority:String(c[5]||""),summary:String(c[6]||""),source:String(c[7]||""),title:String(c[8]||""),url:String(c[9]||""),date:String(c[10]||sheet)});
  }
  return enrichData(data);
}

// === render nav ===

function renderNav() {
  var h = "";
  for (var i = 0; i < SH.length; i++) {
    var d = SH[i];
    var cls = "db" + (d === AS ? " active" : "");
    h += "<button class=" + String.fromCharCode(34) + cls + String.fromCharCode(34) + " onclick=" + String.fromCharCode(34) + "switchDate('" + d + "')" + String.fromCharCode(34) + ">" + d + "</button>";
  }
  document.getElementById("dn").innerHTML = h;
}

async function switchDate(d) {
  AS = d; renderNav();
  document.getElementById("tb").innerHTML = "<tr><td colspan=" + String.fromCharCode(34) + "8" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "loading" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "spinner" + String.fromCharCode(34) + "></div></div></td></tr>";
  D = await fetchData(d);
  applyFilters();
}

// === stats ===

function renderStats(data) {
  var ben=0,har=0,neu=0,unc=0,hi=0,pl=[];
  for (var i = 0; i < data.length; i++) {
    var sig = data[i]._signal;
    if (sig === "ben") ben++;
    else if (sig === "har") har++;
    else if (sig === "unc") unc++;
    else neu++;
    if (data[i]._level === "S") { hi++; window._sCount = (window._sCount||0)+1; }
    if (data[i]._level === "A") hi++;
    if (pl.indexOf(data[i].source) < 0) pl.push(data[i].source);
  }
  var n = data.length;
  var h = "";
  h += "<div class=" + String.fromCharCode(34) + "sc" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "--ca:var(--bl)" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "sl" + String.fromCharCode(34) + ">今日聲量</div><div class=" + String.fromCharCode(34) + "sv" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--bl)" + String.fromCharCode(34) + ">" + n + "</div><div class=" + String.fromCharCode(34) + "ss" + String.fromCharCode(34) + ">" + pl.length + " 個平台</div></div>";
  h += "<div class=" + String.fromCharCode(34) + "sc" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "--ca:var(--ac)" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "sl" + String.fromCharCode(34) + ">有利訊號</div><div class=" + String.fromCharCode(34) + "sv" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--ac)" + String.fromCharCode(34) + ">" + ben + "</div><div class=" + String.fromCharCode(34) + "ss" + String.fromCharCode(34) + ">" + (n ? Math.round(ben/n*100) : 0) + "%</div></div>";
  h += "<div class=" + String.fromCharCode(34) + "sc" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "--ca:var(--da)" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "sl" + String.fromCharCode(34) + ">不利訊號</div><div class=" + String.fromCharCode(34) + "sv" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--da)" + String.fromCharCode(34) + ">" + har + "</div><div class=" + String.fromCharCode(34) + "ss" + String.fromCharCode(34) + ">" + (n ? Math.round(har/n*100) : 0) + "%</div></div>";
  h += "<div class=" + String.fromCharCode(34) + "sc" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "--ca:var(--go)" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "sl" + String.fromCharCode(34) + ">S+A 重要</div><div class=" + String.fromCharCode(34) + "sv" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--go)" + String.fromCharCode(34) + ">" + hi + "</div><div class=" + String.fromCharCode(34) + "ss" + String.fromCharCode(34) + ">高優先事件</div></div>";
  h += "<div class=" + String.fromCharCode(34) + "sc" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "--ca:var(--ye)" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "sl" + String.fromCharCode(34) + ">待判讀</div><div class=" + String.fromCharCode(34) + "sv" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--ye)" + String.fromCharCode(34) + ">" + unc + "</div><div class=" + String.fromCharCode(34) + "ss" + String.fromCharCode(34) + ">需人工覆核</div></div>";
  document.getElementById("sg").innerHTML = h;
}

function renderCands(data) {
  var cands = [{k:"黃柏瑜",c:"huang",l:"彰化市"},{k:"陳素月",c:"chen",l:"彰化縣"}];
  var html = "";
  for (var i = 0; i < cands.length; i++) {
    var cd = cands[i];
    var rows = data.filter(function(r) { return r.candidate === cd.k; });
    var ben = rows.filter(function(r) { return r._signal === "ben"; }).length;
    var har = rows.filter(function(r) { return r._signal === "har"; }).length;
    var neu = rows.filter(function(r) { return r._signal === "neu" || r._signal === "unc"; }).length;
    var n = rows.length;
    var posW = n ? Math.round(ben/n*100) : 33;
    var neuW = n ? Math.round(neu/n*100) : 34;
    var negW = n ? 100-posW-neuW : 33;
    html += "<div class=" + String.fromCharCode(34) + "cc " + cd.c + String.fromCharCode(34) + ">";
    html += "<div class=" + String.fromCharCode(34) + "ch" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cn" + String.fromCharCode(34) + "><span>" + cd.k + "</span></div><div class=" + String.fromCharCode(34) + "clo" + String.fromCharCode(34) + ">" + cd.l + "</div></div>";
    html += "<div class=" + String.fromCharCode(34) + "cbar" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "bpos" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "width:" + posW + "%" + String.fromCharCode(34) + "></div><div class=" + String.fromCharCode(34) + "bneu" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "width:" + neuW + "%" + String.fromCharCode(34) + "></div><div class=" + String.fromCharCode(34) + "bneg" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "width:" + negW + "%" + String.fromCharCode(34) + "></div></div>";
    html += "<div class=" + String.fromCharCode(34) + "cst" + String.fromCharCode(34) + ">";
    html += "<div class=" + String.fromCharCode(34) + "ci" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cnum" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--ac)" + String.fromCharCode(34) + ">" + ben + "</div><div class=" + String.fromCharCode(34) + "clb" + String.fromCharCode(34) + ">有利</div></div>";
    html += "<div class=" + String.fromCharCode(34) + "ci" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cnum" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--ne)" + String.fromCharCode(34) + ">" + neu + "</div><div class=" + String.fromCharCode(34) + "clb" + String.fromCharCode(34) + ">中性</div></div>";
    html += "<div class=" + String.fromCharCode(34) + "ci" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cnum" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--da)" + String.fromCharCode(34) + ">" + har + "</div><div class=" + String.fromCharCode(34) + "clb" + String.fromCharCode(34) + ">不利</div></div>";
    html += "<div class=" + String.fromCharCode(34) + "ci" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "cnum" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "color:var(--go)" + String.fromCharCode(34) + ">" + rows.filter(function(r){return r._level==="S"||r._level==="A";}).length + "</div><div class=" + String.fromCharCode(34) + "clb" + String.fromCharCode(34) + ">S+A</div></div>";
    html += "</div></div>";
  }
  document.getElementById("cg").innerHTML = html;
}

var SIG_LABEL = {"ben":"✅ 有利","har":"❌ 不利","neu":"⚪ 中性","unc":"⚠ 待判讀"};
var SIG_CLASS = {"ben":"sig-ben","har":"sig-har","neu":"sig-neu","unc":"sig-unc"};
var LEV_CLASS = {"S":"lev-s","A":"lev-a","B":"lev-b","C":"lev-c"};

function renderTable(data) {
  document.getElementById("tc").textContent = data.length + " 筆";
  if (!data.length) {
    document.getElementById("tb").innerHTML = "<tr><td colspan=" + String.fromCharCode(34) + "8" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "empty" + String.fromCharCode(34) + ">目前沒有符合條件的資料</div></td></tr>";
    return;
  }
  var html = "";
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    var cc = r.candidate === "黃柏瑜" ? "bhu" : "bch";
    var sigCls = SIG_CLASS[r._signal] || "sig-neu";
    var sigLbl = SIG_LABEL[r._signal] || "⚪";
    var levCls = LEV_CLASS[r._level] || "lev-c";
    var etLbl = EVENT_TYPE_LABEL[r._eventType] || "一般";
    var ts = r.time.length > 5 ? r.time.substring(0, 5) : r.time;
    html += "<tr>";
    html += "<td><span style=" + String.fromCharCode(34) + "font-family:'DM Mono',monospace;font-size:12px;color:var(--mu)" + String.fromCharCode(34) + ">" + ts + "</span></td>";
    html += "<td><span class=" + String.fromCharCode(34) + "badge " + cc + String.fromCharCode(34) + ">" + r.candidate + "</span></td>";
    html += "<td><span style=" + String.fromCharCode(34) + "font-size:12px;color:var(--mu)" + String.fromCharCode(34) + ">" + r.source + "</span></td>";
    html += "<td><span class=" + String.fromCharCode(34) + "badge evt" + String.fromCharCode(34) + ">" + etLbl + "</span></td>";
    html += "<td class=" + String.fromCharCode(34) + "tce" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "ttx" + String.fromCharCode(34) + ">" + r.title + "</div>" + (r.summary ? "<div class=" + String.fromCharCode(34) + "smy" + String.fromCharCode(34) + ">" + r.summary + "</div>" : "") + "</td>";
    html += "<td><span class=" + String.fromCharCode(34) + "badge " + sigCls + String.fromCharCode(34) + ">" + sigLbl + "</span></td>";
    html += "<td><span class=" + String.fromCharCode(34) + "badge " + levCls + String.fromCharCode(34) + ">" + r._level + "</span><span class=" + String.fromCharCode(34) + "score-tag" + String.fromCharCode(34) + ">" + r._score + "pt</span></td>";
    html += "<td>" + (r.url ? "<a class=" + String.fromCharCode(34) + "lnk" + String.fromCharCode(34) + " href=" + String.fromCharCode(34) + r.url + String.fromCharCode(34) + " target=" + String.fromCharCode(34) + "_blank" + String.fromCharCode(34) + ">查看</a>" : "-") + "</td>";
    html += "</tr>";
  }
  document.getElementById("tb").innerHTML = html;
}

// === filter ===

function applyFilters() {
  var f = FILTERS;
  var fd = D.filter(function(r) {
    if (f.cand !== "all" && r.candidate !== (CANDMAP[f.cand] || f.cand)) return false;
    if (f.sig !== "all" && r._signal !== f.sig) return false;
    if (f.lev !== "all" && r._level !== f.lev) return false;
    if (f.src !== "all") {
      var tgt = SRCMAP[f.src] || f.src;
      if (r.source !== tgt) return false;
    }
    return true;
  });
  FD = fd;
  renderStats(D); // stats 还是用全部資料
  renderCands(D);
  renderTable(fd);
  document.getElementById("tc").textContent = fd.length + " 筆";
}

document.querySelectorAll(".fb").forEach(function(b) {
  b.addEventListener("click", function() {
    var g = b.dataset.g, f2 = b.dataset.f;
    FILTERS[g] = f2;
    document.querySelectorAll(".fb[data-g=" + String.fromCharCode(34) + g + String.fromCharCode(34) + "]").forEach(function(x) {
      x.classList.toggle("active", x.dataset.f === f2);
    });
    applyFilters();
  });
});

function renderAll() {
  applyFilters();
  var now = new Date();
  document.getElementById("lup").textContent = "最後更新：" + now.toLocaleString("zh-TW", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

async function init() {
  document.getElementById("lup").textContent = "掃描資料中...";
  try {
    SH = await getSheets();
    if (!SH.length) {
      document.getElementById("sg").innerHTML = "<div class=" + String.fromCharCode(34) + "empty" + String.fromCharCode(34) + " style=" + String.fromCharCode(34) + "grid-column:1/-1" + String.fromCharCode(34) + ">目前沒有可用資料</div>";
      document.getElementById("tb").innerHTML = "<tr><td colspan=" + String.fromCharCode(34) + "8" + String.fromCharCode(34) + "><div class=" + String.fromCharCode(34) + "empty" + String.fromCharCode(34) + ">暫無資料</div></td></tr>";
      document.getElementById("lup").textContent = "尚無資料";
      return;
    }
    AS = SH[0]; renderNav();
    D = await fetchData(AS);
    renderAll();
    setInterval(async function() { D = await fetchData(AS); renderAll(); }, 300000);
  } catch (ex) {
    document.getElementById("lup").textContent = "載入失敗：" + ex.message;
  }
}

init();
</script>
