name: 選情監控排程

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行監控
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX_ID:      ${{ secrets.GOOGLE_CX_ID }}
